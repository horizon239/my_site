              </div>
            )}
            {scr === "home" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {menus.map(function (item) { return (<button key={item.id} onClick={function () { setScr(item.id); }} style={{ display: "flex", alignItems: "center", gap: 16, padding: "20px 22px", background: "rgba(255,255,255,0.9)", border: "2px solid #f0ebe3", borderRadius: 22, cursor: "pointer", boxShadow: "0 6px 24px rgba(0,0,0,0.05)", textAlign: "left" }}><div style={{ fontSize: 36, width: 60, height: 60, display: "flex", alignItems: "center", justifyContent: "center", background: item.color + "12", borderRadius: 16, flexShrink: 0 }}>{item.emoji}</div><div><div style={{ fontFamily: "'Gaegu',cursive", fontSize: 26, fontWeight: 700, color: "#3d3027" }}>{tx(item.tk, lang)}</div><div style={{ fontSize: 16, color: "#8a7e72", marginTop: 2 }}>{tx(item.dk, lang)}</div></div><div style={{ marginLeft: "auto", fontSize: 20, color: "#ccc" }}>▶</div></button>); })}
                <div style={{ marginTop: 4 }}><LiveClock lang={lang} /></div>
              </div>
            )}
            {scr === "learn" && <LearnMode lang={lang} onHome={function () { setScr("home"); }} />}
            {scr === "play" && <PlayMode lang={lang} onHome={function () { setScr("home"); }} />}
            {scr === "quiz" && <QuizMode lang={lang} onHome={function () { setScr("home"); }} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
