<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0a;--surface:#111113;--border:rgba(255,255,255,0.07);--text:#e8e4dc;--muted:#555;--accent:#c8a96e;--accent-dim:rgba(200,169,110,0.15)}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-weight:300;overflow-x:hidden;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}

.app{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 20px 40px;min-height:100vh;display:flex;flex-direction:column;align-items:center}
.home-btn{display:inline-flex;align-items:center;gap:6px;align-self:flex-start;font-size:12px;letter-spacing:0.15em;color:#555;text-decoration:none;margin-bottom:20px;transition:color 0.2s}
.home-btn:hover{color:var(--accent)}
.header{text-align:center;margin-bottom:6px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:0.12em;color:var(--text);line-height:1}
.header-sub{font-size:12px;color:#555;margin-bottom:20px;letter-spacing:0.05em;text-align:center}


.count-row{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.count-adj{
  width:36px;height:36px;border:1px solid var(--border);border-radius:50%;
  background:transparent;color:#888;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;line-height:1
}
.count-adj:hover{border-color:var(--accent);color:var(--accent)}
.count-adj:active{background:var(--accent-dim);transform:scale(0.92)}
.count-adj:disabled{opacity:0.2;cursor:default;transform:none}
.count-display{
  font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);
  min-width:40px;text-align:center;letter-spacing:0.05em;line-height:1
}

#canvas-wrap{width:100%;max-width:100%;aspect-ratio:4/3;border-radius:8px;margin-bottom:12px;position:relative;touch-action:none}
#canvas-wrap canvas{display:block;width:100%;height:100%;cursor:grab}
#canvas-wrap canvas:active{cursor:grabbing}

.drag-hint{
  font-size:12px;color:#444;text-align:center;margin-bottom:16px;
  letter-spacing:0.05em;transition:opacity 0.3s
}
.drag-hint span{color:var(--accent);font-weight:400}

.result{text-align:center;margin-bottom:12px;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.result-numbers{font-family:'Bebas Neue',sans-serif;font-size:56px;letter-spacing:0.08em;color:var(--accent);line-height:1;opacity:0;transform:scale(0.5);transition:opacity 0.4s,transform 0.4s cubic-bezier(0.2,1.2,0.4,1)}
.result-numbers.show{opacity:1;transform:scale(1)}
.result-total{font-size:13px;color:#555;margin-top:6px;letter-spacing:0.1em;opacity:0;transition:opacity 0.4s 0.15s}
.result-total.show{opacity:1}

.history{margin-top:8px;width:100%;max-width:400px}
.history-label{font-size:10px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px;font-weight:500}
.history-list{display:flex;flex-wrap:wrap;gap:6px}
.history-chip{padding:5px 12px;background:var(--surface);border:1px solid var(--border);border-radius:3px;font-size:12px;color:#666;font-family:'Bebas Neue',sans-serif;letter-spacing:0.08em}
.history-chip .chip-sum{color:var(--accent);margin-left:4px}


@media(max-width:500px){
  .app{padding:8px 8px 24px}
  .header h1{font-size:30px}
  .result-numbers{font-size:44px}
}
</style>

<div class="app">
  <a class="home-btn" href="index.html">← <span id="txtHome">홈으로</span></a>
  <div class="header"><h1 id="txtTitle">주사위 던지기</h1></div>
  <p class="header-sub" id="txtSub">주사위를 잡고 흔든 뒤 던져보세요!</p>

  <div class="count-row">
    <button class="count-adj" id="btnMinus" onclick="adjCount(-1)">−</button>
    <span class="count-display" id="countDisplay">1</span>
    <button class="count-adj" id="btnPlus" onclick="adjCount(1)">+</button>

  <div id="canvas-wrap"></div>
  <div class="drag-hint" id="dragHint"><span id="txtHint">주사위를 터치해서 흔들고 놓으세요</span></div>

  <div class="result">
    <div class="result-numbers" id="resultNum"></div>
    <div class="result-total" id="resultTotal"></div>

      <button id="btnClearHist" onclick="clearHistory()" style="font-size:11px;color:#c85e5e;background:none;border:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;opacity:0.6;transition:opacity 0.2s" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.6">초기화</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
