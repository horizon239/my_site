<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한자 친구 — 어린이 한자 학습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fef6e9;
  --bg2:#ffe9d2;
  --card:#ffffff;
  --ink:#3a2f25;
  --muted:#9a8a76;
  --line:#f0e2cf;
  --primary:#ff8a3d;
  --primary-d:#f06d1c;
  --blue:#4aa3e8;
  --green:#5ec98a;
  --purple:#9b7ede;
  --red:#ef6f6f;
  --gold:#f3b53e;
  --hanja:#c0392b;
  --shadow:0 10px 30px rgba(190,120,40,0.14);
  --shadow-sm:0 4px 14px rgba(190,120,40,0.12);
}
html,body{
  height:100%;
  background:linear-gradient(160deg,var(--bg),var(--bg2));
  color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
.hanja-font{font-family:'Noto Serif KR',serif}
.app{
  width:min(720px,100%);
  margin:0 auto;
  min-height:100vh;
  padding:14px 16px 96px;
  position:relative;
}
/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.home{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 12px;border-radius:14px;background:#fff;
  text-decoration:none;color:var(--muted);font-size:13px;font-weight:700;
  box-shadow:var(--shadow-sm);
}
.home:hover{color:var(--primary-d)}
.title{font-family:'Jua',sans-serif;font-size:20px;color:var(--primary-d);letter-spacing:.02em}
.mascot-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 10px;border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);
  font-size:13px;font-weight:700;color:var(--ink);
}
.mascot-chip .face{font-size:20px;line-height:1}
.mascot-chip img{width:24px;height:24px;object-fit:contain;border-radius:50%}
/* ── Screens ── */
.screen{display:none;animation:fade .3s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h2{font-family:'Jua',sans-serif;font-size:22px;color:var(--ink);margin:4px 2px 14px}
.sub{color:var(--muted);font-size:14px;margin:-8px 2px 16px}
.back-btn{
  display:inline-flex;align-items:center;gap:5px;margin-bottom:12px;
  padding:7px 13px;border-radius:13px;background:#fff;box-shadow:var(--shadow-sm);
  font-size:13px;font-weight:700;color:var(--muted);
}
/* ── Home hero ── */
.hero{
  background:linear-gradient(135deg,#fff3e3,#ffe4cb);
  border-radius:26px;padding:24px 22px;margin-bottom:18px;
  box-shadow:var(--shadow);text-align:center;position:relative;overflow:hidden;
}
.hero .big-mascot{font-size:64px;line-height:1;margin-bottom:6px}
.hero .big-mascot img{width:84px;height:84px;object-fit:contain}
.hero h1{font-family:'Jua',sans-serif;font-size:26px;color:var(--primary-d);margin-bottom:4px}
.hero p{color:#a06a3c;font-size:14px;font-weight:500}
.hero .speech{
  margin-top:12px;display:inline-block;background:#fff;border-radius:16px;
  padding:10px 16px;font-size:14px;font-weight:700;box-shadow:var(--shadow-sm);
}
/* menu grid on home */
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.menu-card{
  border-radius:22px;padding:20px 16px;text-align:center;color:#fff;
  box-shadow:var(--shadow);transition:transform .12s;
}
.menu-card:active{transform:scale(.96)}
.menu-card .ic{font-size:38px;line-height:1;margin-bottom:8px}
.menu-card .nm{font-family:'Jua',sans-serif;font-size:18px}
.menu-card .ds{font-size:12px;opacity:.92;margin-top:3px;font-weight:500}
.m-learn{background:linear-gradient(135deg,#4aa3e8,#3d8ed0)}
.m-play{background:linear-gradient(135deg,#5ec98a,#46b774)}
.m-exam{background:linear-gradient(135deg,#9b7ede,#8264d0)}
.m-record{background:linear-gradient(135deg,#f3b53e,#e89f1f)}
/* ── Grade chips ── */
.grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:12px}
.grade-chip{
  background:var(--card);border-radius:18px;padding:16px 10px;text-align:center;
  box-shadow:var(--shadow-sm);transition:transform .12s;border:2px solid transparent;
}
.grade-chip:active{transform:scale(.95)}
.grade-chip .g{font-family:'Jua',sans-serif;font-size:22px;color:var(--primary-d)}
.grade-chip .c{font-size:12px;color:var(--muted);margin-top:3px}
.grade-chip .prog{margin-top:8px;height:6px;border-radius:6px;background:var(--line);overflow:hidden}
.grade-chip .prog > i{display:block;height:100%;background:var(--green);border-radius:6px}
.grade-chip.locked{opacity:.55}
.grade-chip .soon{font-size:11px;color:var(--purple);font-weight:700;margin-top:6px}
/* ── Hanja list ── */
.hanja-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:10px}
.hanja-cell{
  background:var(--card);border-radius:16px;padding:12px 4px 9px;text-align:center;
  box-shadow:var(--shadow-sm);transition:transform .12s;position:relative;border:2px solid transparent;
}
.hanja-cell:active{transform:scale(.93)}
.hanja-cell .ch{font-family:'Noto Serif KR',serif;font-size:30px;color:var(--hanja);line-height:1.1}
.hanja-cell .hu{font-size:11px;color:var(--muted);margin-top:4px}
.hanja-cell.done{border-color:var(--green)}
.hanja-cell.done::after{content:'✓';position:absolute;top:5px;right:7px;color:var(--green);font-weight:900;font-size:13px}
/* ── Card detail ── */
.card-detail{background:var(--card);border-radius:26px;padding:22px 20px;box-shadow:var(--shadow);text-align:center}
#writer-target{width:200px;height:200px;margin:0 auto;background:#fffdf8;border-radius:20px;border:2px dashed var(--line)}
.card-meta{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:14px 0 6px}
.tag{background:var(--bg);border-radius:12px;padding:6px 12px;font-size:13px;font-weight:700;color:var(--ink)}
.tag b{color:var(--primary-d)}
.hunum{font-family:'Jua',sans-serif;font-size:24px;color:var(--ink);margin-top:6px}
.hunum .eum{color:var(--hanja)}
.word-box{margin-top:14px;background:var(--bg);border-radius:16px;padding:14px}
.word-box .w{font-size:18px;font-weight:700}
.word-box .w .hj{font-family:'Noto Serif KR',serif;color:var(--hanja)}
.word-box .s{font-size:14px;color:var(--muted);margin-top:8px;line-height:1.5}
.row-btn{display:flex;gap:10px;margin-top:16px}
.btn{
  flex:1;padding:14px;border-radius:16px;font-family:'Jua',sans-serif;font-size:16px;
  background:#fff;box-shadow:var(--shadow-sm);color:var(--ink);transition:transform .1s;
}
.btn:active{transform:scale(.96)}
.btn.primary{background:var(--primary);color:#fff}
.btn.blue{background:var(--blue);color:#fff}
.btn.green{background:var(--green);color:#fff}
.btn.ghost{background:#fff;color:var(--muted)}
.btn:disabled{opacity:.4}
/* ── Play menu ── */
.play-list{display:flex;flex-direction:column;gap:14px}
.play-card{
  display:flex;align-items:center;gap:16px;background:var(--card);border-radius:20px;
  padding:18px;box-shadow:var(--shadow-sm);transition:transform .12s;text-align:left;
}
.play-card:active{transform:scale(.97)}
.play-card .pic{font-size:36px;width:56px;text-align:center}
.play-card .pt{font-family:'Jua',sans-serif;font-size:18px}
.play-card .pd{font-size:13px;color:var(--muted);margin-top:2px}
/* ── Quiz / game shared ── */
.quiz-wrap{background:var(--card);border-radius:24px;padding:22px 18px;box-shadow:var(--shadow);text-align:center}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:13px;font-weight:700;color:var(--muted)}
@keyframes blink{50%{opacity:.4}}
/* 모의고사 전용 */
.exam-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.exam-timer{font-weight:700;color:var(--primary-d);font-variant-numeric:tabular-nums;font-size:16px}
.exam-timer.low{color:var(--red);animation:blink 1s steps(2,start) infinite}
.btn-sm{padding:8px 16px;border-radius:13px;background:var(--green);color:#fff;font-weight:700;box-shadow:var(--shadow-sm)}
.opt.chosen{background:#e2d6f6;border-color:var(--purple)}
.flag-btn{margin-top:14px;width:100%;padding:12px;border-radius:14px;background:var(--bg);font-weight:700;color:var(--muted);box-shadow:var(--shadow-sm);transition:background .15s}
.flag-btn.on{background:#fff3d6;color:#cf8a1c;border:2px solid var(--gold)}
.qpalette{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:18px}
.pcell{width:34px;height:34px;border-radius:9px;background:var(--bg);font-size:13px;font-weight:700;color:var(--muted);box-shadow:var(--shadow-sm);position:relative}
.pcell.ans{background:#d9e9fb;color:var(--blue)}
.pcell.cur{outline:3px solid var(--primary);outline-offset:1px}
.pcell.flag::after{content:'🚩';position:absolute;top:-7px;right:-5px;font-size:11px}
.quiz-q{font-size:15px;color:var(--muted);font-weight:700;margin-bottom:6px}
.quiz-big{font-family:'Noto Serif KR',serif;font-size:72px;color:var(--hanja);line-height:1.1;margin:6px 0 18px}
.quiz-big.small{font-size:34px;font-family:'Jua',sans-serif;color:var(--ink)}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.opt{
  padding:18px 10px;border-radius:18px;background:var(--bg);font-size:17px;font-weight:700;
  transition:transform .1s,background .15s;border:2px solid transparent;
}
.opt .hj{font-family:'Noto Serif KR',serif;font-size:30px;color:var(--hanja)}
.opt:active{transform:scale(.96)}
.opt.correct{background:#d9f6e4;border-color:var(--green)}
.opt.wrong{background:#fde0e0;border-color:var(--red)}
.feedback{min-height:26px;margin-top:14px;font-family:'Jua',sans-serif;font-size:18px}
.feedback.ok{color:var(--green)}
.feedback.no{color:var(--red)}
/* progress bar */
.pbar{height:10px;border-radius:8px;background:var(--line);overflow:hidden;margin-bottom:14px}
.pbar > i{display:block;height:100%;background:var(--primary);border-radius:8px;transition:width .3s}
/* memory game */
.mem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mem-card{
  aspect-ratio:3/4;border-radius:14px;background:var(--primary);
  display:grid;place-items:center;cursor:pointer;position:relative;
  transition:transform .15s;box-shadow:var(--shadow-sm);
}
.mem-card .inner{font-family:'Noto Serif KR',serif;font-size:24px;color:var(--hanja);
  font-weight:700;opacity:0;text-align:center;padding:4px;line-height:1.2}
.mem-card.flip{background:#fff}
.mem-card.flip .inner{opacity:1}
.mem-card.flip .inner.mean{font-family:'Jua',sans-serif;font-size:16px;color:var(--ink)}
.mem-card.matched{background:#d9f6e4;cursor:default}
.mem-card.matched .inner{color:var(--green)}
/* result screen */
.result{background:var(--card);border-radius:26px;padding:28px 20px;box-shadow:var(--shadow);text-align:center}
.result .em{font-size:64px;line-height:1}
.result .sc{font-family:'Jua',sans-serif;font-size:40px;color:var(--primary-d);margin:8px 0}
.result .msg{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}
.result .pf{display:inline-block;padding:6px 16px;border-radius:14px;font-weight:700;font-size:14px;margin-top:6px}
.result .pf.pass{background:#d9f6e4;color:#2f9e5e}
.result .pf.fail{background:#fde0e0;color:#d9534f}
/* ── Record ── */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.stat{background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow-sm);text-align:center}
.stat .v{font-family:'Jua',sans-serif;font-size:28px;color:var(--primary-d)}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}
.section-t{font-family:'Jua',sans-serif;font-size:17px;margin:18px 2px 10px}
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:12px}
.badge{background:var(--card);border-radius:16px;padding:14px 6px;text-align:center;box-shadow:var(--shadow-sm)}
.badge .be{font-size:32px;line-height:1;filter:grayscale(1);opacity:.35}
.badge.got .be{filter:none;opacity:1}
.badge .bn{font-size:11px;font-weight:700;margin-top:6px;color:var(--muted)}
.badge.got .bn{color:var(--ink)}
/* mascot select */
.mascot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:12px}
.mascot-opt{background:var(--card);border-radius:18px;padding:16px 8px;text-align:center;box-shadow:var(--shadow-sm);border:3px solid transparent;transition:transform .12s}
.mascot-opt:active{transform:scale(.95)}
.mascot-opt.sel{border-color:var(--primary)}
.mascot-opt .mf{font-size:40px;line-height:1}
.mascot-opt .mf img{width:52px;height:52px;object-fit:contain}
.mascot-opt .mn{font-size:12px;font-weight:700;margin-top:6px}
/* ── Bottom tab bar ── */
.tabbar{
  position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
  width:min(680px,calc(100% - 24px));background:#fff;border-radius:22px;
  box-shadow:0 8px 28px rgba(150,90,30,.2);display:flex;padding:8px;gap:4px;z-index:50;
}
.tab{flex:1;border-radius:16px;padding:9px 4px;text-align:center;color:var(--muted);transition:background .15s,color .15s}
.tab .ti{font-size:22px;line-height:1}
.tab .tl{font-size:11px;font-weight:700;margin-top:3px}
.tab.active{background:var(--bg);color:var(--primary-d)}
/* toast */
.toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:12px 22px;border-radius:16px;font-weight:700;font-size:14px;
  opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:90;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;color:var(--muted);padding:40px 10px;font-weight:500}
.empty .ee{font-size:46px;margin-bottom:10px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

</head>
<body>
<div class="app">
  <div class="topbar">
    <a class="home" href="index.html">← 홈</a>
    <div class="title">한자 친구</div>
    <button class="mascot-chip" id="mascotChip" onclick="go('record')">
      <span class="face" id="mascotFace">🦊</span>
    </button>
  </div>

  <!-- HOME -->
  <section class="screen active" id="s-home">
    <div class="hero">
      <div class="big-mascot" id="heroMascot">🦊</div>
      <h1>한자 친구</h1>
      <p>재미있게 배우는 한자 8급 ~ 5급</p>
      <div class="speech" id="heroSpeech">오늘도 한자 배우러 왔구나! 🎉</div>
    </div>
    <div class="menu-grid">
      <button class="menu-card m-learn" onclick="go('learn')">
        <div class="ic">📖</div><div class="nm">배우기</div><div class="ds">한자 카드 · 획순</div>
      </button>
      <button class="menu-card m-play" onclick="go('play')">
        <div class="ic">🎮</div><div class="nm">놀이하기</div><div class="ds">게임으로 연습</div>
      </button>
      <button class="menu-card m-exam" onclick="go('exam')">
        <div class="ic">📝</div><div class="nm">시험 대비</div><div class="ds">모의고사 · 오답</div>
      </button>
      <button class="menu-card m-record" onclick="go('record')">
        <div class="ic">⭐</div><div class="nm">내 기록</div><div class="ds">진도 · 배지</div>
      </button>
    </div>
  </section>

  <!-- LEARN: grade select -->
  <section class="screen" id="s-learn">
    <div class="h2">📖 배우기</div>
    <div class="sub">급수를 골라 한자를 배워요</div>
    <div class="grade-grid" id="learnGrades"></div>
  </section>

  <!-- LEARN: hanja list -->
  <section class="screen" id="s-list">
    <button class="back-btn" onclick="go('learn')">← 급수 선택</button>
    <div class="h2" id="listTitle"></div>
    <div class="hanja-grid" id="hanjaList"></div>
  </section>

  <!-- LEARN: card detail -->
  <section class="screen" id="s-card">
    <button class="back-btn" id="cardBack">← 목록</button>
    <div class="card-detail">
      <div id="writer-target"></div>
      <div class="hunum" id="cardHunum"></div>
      <div class="card-meta" id="cardMeta"></div>
      <div class="word-box" id="cardWordBox">
        <div class="w" id="cardWord"></div>
        <div class="s" id="cardSentence"></div>
      </div>
      <div class="row-btn">
        <button class="btn blue" onclick="animateStroke()">✏️ 획순 보기</button>
        <button class="btn ghost" onclick="practiceWrite()">손으로 쓰기</button>
      </div>
      <div class="row-btn">
        <button class="btn ghost" id="cardPrev">◀ 이전</button>
        <button class="btn green" id="cardLearned">배웠어요 ✓</button>
        <button class="btn ghost" id="cardNext">다음 ▶</button>
      </div>
    </div>
  </section>

  <!-- PLAY menu -->
  <section class="screen" id="s-play">
    <div class="h2">🎮 놀이하기</div>
    <div class="sub">게임으로 한자를 익혀요</div>
    <div class="play-list">
      <button class="play-card" onclick="startGameSelect('mean')">
        <div class="pic">🎯</div><div><div class="pt">뜻 맞추기</div><div class="pd">한자를 보고 뜻과 소리를 골라요</div></div>
      </button>
      <button class="play-card" onclick="startGameSelect('memory')">
        <div class="pic">🃏</div><div><div class="pt">짝 맞추기</div><div class="pd">한자와 뜻 카드를 짝지어요</div></div>
      </button>
      <button class="play-card" onclick="startGameSelect('write')">
        <div class="pic">✍️</div><div><div class="pt">획순 쓰기</div><div class="pd">순서대로 한자를 따라 써요</div></div>
      </button>
    </div>
  </section>

  <!-- generic grade select for games/exam -->
  <section class="screen" id="s-gradepick">
    <button class="back-btn" id="gradePickBack">← 뒤로</button>
    <div class="h2" id="gradePickTitle"></div>
    <div class="sub" id="gradePickSub"></div>
    <div class="grade-grid" id="gradePickGrades"></div>
  </section>

  <!-- GAME: 뜻 맞추기 (also used as exam quiz) -->
  <section class="screen" id="s-quiz">
    <button class="back-btn" id="quizBack">← 그만하기</button>
    <div class="quiz-wrap">
      <div class="quiz-top"><span id="quizCount"></span><span id="quizScore"></span></div>
      <div class="pbar"><i id="quizBar"></i></div>
      <div class="quiz-q" id="quizPrompt"></div>
      <div class="quiz-big" id="quizBig"></div>
      <div class="opts" id="quizOpts"></div>
      <div class="feedback" id="quizFeedback"></div>
    </div>
  </section>

  <!-- GAME: 짝 맞추기 -->
  <section class="screen" id="s-memory">
    <button class="back-btn" id="memBack">← 그만하기</button>
    <div class="quiz-wrap">
      <div class="quiz-top"><span id="memMoves">뒤집기 0</span><span id="memPairs"></span></div>
      <div class="mem-grid" id="memGrid"></div>
    </div>
  </section>

  <!-- GAME: 획순 쓰기 -->
  <section class="screen" id="s-write">
    <button class="back-btn" id="writeBack">← 그만하기</button>
    <div class="quiz-wrap">
      <div class="quiz-top"><span id="writeCount"></span><span id="writeHint"></span></div>
      <div class="quiz-q" id="writePrompt"></div>
      <div id="write-target" style="width:240px;height:240px;margin:10px auto;background:#fffdf8;border-radius:20px;border:2px dashed var(--line)"></div>
      <div class="feedback" id="writeFeedback"></div>
      <div class="row-btn">
