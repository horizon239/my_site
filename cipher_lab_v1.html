<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Noto+Sans+KR:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;
  --surface:#111113;
  --surface-2:#151518;
  --line:rgba(255,255,255,0.08);
  --line-strong:rgba(200,169,110,0.36);
  --text:#e8e4dc;
  --muted:#8a8377;
  --dim:#5e5a52;
  --accent:#c8a96e;
  --ok:#8fd6bb;
  --warn:#e5c07b;
  --bad:#df8a8a;
}
html,body{
  min-height:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Noto Sans KR',sans-serif;
  font-weight:300;
  overflow-x:hidden;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 70% 45% at 50% 0%,rgba(200,169,110,0.09),transparent 65%),
    linear-gradient(var(--line) 1px,transparent 1px),
    linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:auto,72px 72px,72px 72px;
  pointer-events:none;
}
button,textarea,input{font:inherit}
button{color:inherit}
.app{
  position:relative;
  z-index:1;
  width:min(1180px,100%);
  margin:0 auto;
  padding:24px 18px 42px;
}
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}
.home{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:34px;
  padding:7px 12px;
  border:1px solid var(--line);
  border-radius:6px;
  background:rgba(255,255,255,0.03);
  color:var(--muted);
  text-decoration:none;
  font-size:12px;
  letter-spacing:0.08em;
}
.home:hover{border-color:var(--line-strong);color:var(--accent)}
.status{
  min-height:32px;
  padding:7px 11px;
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--dim);
  font-size:12px;
}
.status.ok{color:var(--ok);border-color:rgba(143,214,187,0.3)}
.status.bad{color:var(--bad);border-color:rgba(223,138,138,0.3)}
.top-actions{
  display:flex;
  align-items:center;
  gap:8px;
}
.lang-toggle{
  display:flex;
  padding:3px;
  border:1px solid var(--line);
  border-radius:6px;
  background:rgba(255,255,255,0.03);
}
.lang-btn{
  min-width:38px;
  min-height:26px;
  border:0;
  border-radius:4px;
  background:transparent;
  color:var(--dim);
  cursor:pointer;
  font-size:11px;
  letter-spacing:0.08em;
}
.lang-btn.active{
  background:rgba(200,169,110,0.14);
  color:var(--accent);
}
.hero{
  display:grid;
  grid-template-columns:minmax(0,1fr) auto;
  gap:20px;
  align-items:end;
  padding-bottom:22px;
  border-bottom:1px solid var(--line);
  margin-bottom:22px;
}
.eyebrow{
  color:var(--accent);
  letter-spacing:0.28em;
  text-transform:uppercase;
  font-size:11px;
  margin-bottom:10px;
}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(54px,9vw,104px);
  line-height:0.9;
  letter-spacing:0.16em;
  font-weight:400;
}
.hero p{
  max-width:690px;
  margin-top:14px;
  color:var(--muted);
  line-height:1.75;
  font-size:14px;
}
.meta{
  display:grid;
  grid-template-columns:repeat(2,auto);
  gap:8px;
}
.meta span{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:32px;
  padding:8px 11px;
  border:1px solid var(--line);
  border-radius:6px;
  color:var(--dim);
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  white-space:nowrap;
}
.workspace{
  display:grid;
  grid-template-columns:minmax(0,1.08fr) minmax(320px,0.72fr);
  gap:18px;
  align-items:start;
}
.panel{
  background:rgba(17,17,19,0.92);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:0 18px 60px rgba(0,0,0,0.24);
}
.tool{
  padding:16px;
}
.mode-row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:14px;
}
.seg-btn,.cipher-btn,.action-btn,.small-btn{
  border:1px solid var(--line);
  background:rgba(255,255,255,0.035);
  border-radius:6px;
  cursor:pointer;
  transition:border-color 0.18s,background 0.18s,color 0.18s,transform 0.12s;
}
.seg-btn{
  min-height:42px;
  color:var(--muted);
  font-size:13px;
  letter-spacing:0.12em;
  text-transform:uppercase;
}
.seg-btn.active,.cipher-btn.active{
  border-color:var(--line-strong);
  background:rgba(200,169,110,0.12);
  color:var(--accent);
}
.seg-btn:active,.cipher-btn:active,.action-btn:active,.small-btn:active{transform:scale(0.98)}
.field-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}
.label-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:7px;
}
label,.group-title{
  color:var(--accent);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
}
.hint{
  color:var(--dim);
  font-size:12px;
}
.clear-input-btn{
  margin-left:auto;
  padding:4px 12px;
  height:28px;
  font-size:13px;
  line-height:1;
  border:1px solid var(--line);
  border-radius:6px;
  background:transparent;
  color:var(--dim);
  cursor:pointer;
}
.clear-input-btn:hover{
  border-color:var(--line-strong);
  color:var(--accent);
}
textarea{
  width:100%;
  min-height:154px;
  resize:vertical;
  border:1px solid var(--line);
  border-radius:8px;
  background:#0d0d0f;
  color:var(--text);
  padding:14px;
  line-height:1.65;
  outline:none;
}
textarea:focus,input:focus{border-color:var(--line-strong)}
.output{
  min-height:154px;
  white-space:pre-wrap;
  overflow:auto;
}
.cipher-groups{
  display:grid;
  gap:12px;
  margin:14px 0;
}
.cipher-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:8px;
  margin-top:8px;
}
.cipher-btn{
  min-height:54px;
  padding:9px 8px;
  text-align:left;
}
.cipher-name{
  display:block;
  font-size:13px;
  font-weight:500;
  color:var(--text);
  margin-bottom:5px;
}
.cipher-btn.active .cipher-name{color:var(--accent)}
.badge{
  display:inline-flex;
  min-height:19px;
  align-items:center;
  padding:3px 6px;
  border-radius:4px;
  border:1px solid var(--line);
  color:var(--dim);
  font-size:10px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}
.badge.kor{color:var(--ok);border-color:rgba(143,214,187,0.25)}
.badge.key{color:var(--warn);border-color:rgba(229,192,123,0.25)}
.options{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}
.option-field{
  display:none;
}
.option-field.show{display:block}
input{
  width:100%;
  min-height:42px;
  border:1px solid var(--line);
  border-radius:6px;
  background:#0d0d0f;
  color:var(--text);
  padding:9px 11px;
  outline:none;
}
.actions{
  display:grid;
  grid-template-columns:1.25fr repeat(4,1fr);
  gap:8px;
}
.action-btn{
  min-height:42px;
  color:var(--muted);
  font-size:12px;
  letter-spacing:0.09em;
  text-transform:uppercase;
}
.action-btn.primary{
  color:#111;
  background:var(--accent);
  border-color:var(--accent);
  font-weight:700;
}
.action-btn:hover,.small-btn:hover,.cipher-btn:hover,.seg-btn:hover{border-color:var(--line-strong);color:var(--accent)}
.action-btn:disabled{
  opacity:0.38;
  cursor:not-allowed;
  border-color:var(--line);
  color:var(--dim);
}
.action-btn.playing{
  border-color:rgba(143,214,187,0.42);
  color:var(--ok);
  background:rgba(143,214,187,0.08);
}
.guide{
  overflow:hidden;
}
.guide-head{
  padding:15px 16px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:14px;
}
.guide-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  letter-spacing:0.12em;
  line-height:1;
}
.guide-tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  justify-content:flex-end;
}
.guide-body{
  padding:16px;
}
.guide-text{
  color:var(--muted);
  line-height:1.75;
  font-size:14px;
  margin-bottom:14px;
}
.fact-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-bottom:14px;
}
.fact{
  border:1px solid var(--line);
  border-radius:6px;
  padding:10px;
}
.fact b{
  display:block;
  color:var(--dim);
  font-size:10px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  margin-bottom:5px;
}
.fact span{
  color:var(--text);
  font-size:13px;
}
.example{
  border:1px solid var(--line);
  border-radius:8px;
  background:#0d0d0f;
  padding:12px;
  margin-bottom:12px;
}
.example pre{
  color:var(--text);
  white-space:pre-wrap;
  line-height:1.65;
  font-size:13px;
  font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
.guide-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.small-btn{
  min-height:38px;
  color:var(--muted);
  font-size:12px;
}
.note{
  margin-top:14px;
  color:var(--dim);
  font-size:12px;
  line-height:1.7;
}
@media (max-width:920px){
  .hero{grid-template-columns:1fr}
  .meta{grid-template-columns:repeat(4,auto);justify-content:start}
  .workspace{grid-template-columns:1fr}
}
@media (max-width:620px){
  .app{padding:18px 12px 34px}
  .topbar{align-items:flex-start;flex-direction:column}
  .top-actions{width:100%;justify-content:space-between}
  .hero{gap:12px}
  .meta{grid-template-columns:repeat(2,auto)}
  .tool,.guide-body{padding:12px}
  .cipher-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .options,.actions,.guide-actions,.fact-grid{grid-template-columns:1fr}
  textarea,.output{min-height:132px}
}
</style>

<body>
<main class="app">
  <div class="topbar">
    <a class="home" href="index.html">← Just Play</a>
    <div class="top-actions">
      <div class="lang-toggle" aria-label="Language">
        <button class="lang-btn active" type="button" data-lang="ko">KO</button>
        <button class="lang-btn" type="button" data-lang="en">EN</button>
      </div>
      <div class="status" id="status">Ready</div>
    </div>
  </div>

  <header class="hero">
    <div>
      <div class="eyebrow" id="heroEyebrow">Secret Text Tool</div>
      <h1>Cipher Lab</h1>
      <p id="heroDesc">한글까지 다루는 인코딩 도구와 영문 중심의 고전 암호를 한 곳에서 실험합니다. 암호문과 키를 따로 복사해서 작은 비밀 메시지도 만들 수 있습니다.</p>
    </div>
    <div class="meta" aria-label="지원 정보" id="metaInfo">
      <span id="metaEncode">Encode</span>
      <span id="metaDecode">Decode</span>
      <span id="metaKorean">Korean</span>
      <span id="metaClassic">Classic</span>
    </div>
  </header>

  <section class="workspace">
    <div class="panel tool">
      <div class="mode-row" role="group" aria-label="모드 선택">
        <button class="seg-btn active" type="button" data-mode="encode">Encode</button>
        <button class="seg-btn" type="button" data-mode="decode">Decode</button>
      </div>

      <div class="field-grid">
        <div>
          <div class="label-row">
            <label for="inputText" id="inputLabel">Input</label>
            <span class="hint" id="inputHint">원문 또는 암호문</span>
            <button class="clear-input-btn" type="button" id="clearInputBtn">내용 지우기</button>
          </div>
          <textarea id="inputText" spellcheck="false"></textarea>
        </div>

        <div class="cipher-groups">
          <div>
            <div class="group-title" id="universalTitle">Universal</div>
            <div class="cipher-grid" id="universalGrid"></div>
          </div>
          <div>
            <div class="group-title" id="classicTitle">Classic</div>
            <div class="cipher-grid" id="classicGrid"></div>
          </div>
        </div>

        <div class="options">
          <div class="option-field" id="shiftWrap">
            <div class="label-row">
              <label for="shiftKey" id="shiftLabel">Shift Key</label>
              <span class="hint">0-25</span>
            </div>
            <input id="shiftKey" type="number" min="0" max="25" value="7">
          </div>
          <div class="option-field" id="keywordWrap">
            <div class="label-row">
              <label for="keywordKey" id="keywordLabel">Keyword</label>
              <span class="hint">A-Z</span>
            </div>
            <input id="keywordKey" type="text" value="SECRET" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div>
          <div class="label-row">
            <label for="outputText" id="outputLabel">Output</label>
            <span class="hint" id="outputHint">결과</span>
          </div>
          <textarea id="outputText" class="output" readonly spellcheck="false"></textarea>
        </div>

        <div class="actions">
          <button class="action-btn primary" type="button" id="runBtn">Convert</button>
          <button class="action-btn" type="button" id="copyResultBtn">Copy Result</button>
          <button class="action-btn" type="button" id="playMorseBtn" disabled>Play Morse</button>
          <button class="action-btn" type="button" id="copyKeyBtn">Copy Key</button>
          <button class="action-btn" type="button" id="swapBtn">Swap</button>
        </div>
      </div>
    </div>

    <aside class="panel guide" aria-live="polite">
      <div class="guide-head">
        <div>
          <div class="eyebrow" id="guideEyebrow">About This Cipher</div>
          <div class="guide-title" id="guideTitle">Base64</div>
        </div>
        <div class="guide-tags" id="guideTags"></div>
      </div>
      <div class="guide-body">
        <p class="guide-text" id="guideText"></p>
        <div class="fact-grid">
          <div class="fact">
            <b id="supportLabel">문자 지원</b>
            <span id="supportText"></span>
          </div>
          <div class="fact">
            <b id="keyLabel">비밀 키</b>
            <span id="keyText"></span>
          </div>
        </div>
        <div class="example">
          <pre id="exampleText"></pre>
        </div>
        <div class="guide-actions">
          <button class="small-btn" type="button" id="tryExampleBtn">Try Example</button>
          <button class="small-btn" type="button" id="clearBtn">Clear</button>
        </div>
        <p class="note" id="noteText"></p>
      </div>
    </aside>
  </section>
