<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반응속도 테스트 | Just Play</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2d3148;
      --accent: #7c6af7;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }

    nav {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 8px;
    }

    .home {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
    }
    .home:hover { color: var(--text); }

    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--accent); }

    .screen {
      display: none;
      width: 100%;
      max-width: 600px;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .screen.active { display: flex; }

    .title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 24px;
      text-align: center;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .btn {
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .home-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 280px;
    }

    .info-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .info-card-title {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .grade-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .grade-row:last-child { margin-bottom: 0; }
    .grade-name-cell {
      font-weight: 600;
      min-width: 56px;
    }
    .grade-range {
      color: var(--text-muted);
    }

    /* Game */
    .game-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .round-label {
      font-size: 14px;
      color: var(--text-muted);
    }
    .quit-btn {
      padding: 6px 14px;
      font-size: 13px;
    }

    .progress-dots {
      display: flex;
      gap: 10px;
    }
    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s;
    }
    .dot.done { background: var(--accent); }
    .dot.current { background: var(--green); }

    #gameArea {
      width: 100%;
      height: 280px;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: background 0.12s, border-color 0.12s;
      background: var(--surface);
      border: 2px solid var(--border);
      gap: 10px;
    }
    #gameArea.ready {
      background: #14532d;
      border-color: var(--green);
    }
    #gameArea.penalized {
      background: #7f1d1d;
      border-color: var(--red);
    }

    #gameMessage {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      pointer-events: none;
    }
    #gameSubMessage {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      pointer-events: none;
    }

    #lastTimeDisplay {
      font-size: 14px;
      color: var(--text-muted);
      min-height: 20px;
    }

    /* Result */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .grade-emoji { font-size: 3rem; }
    .grade-label {
      font-size: 1.4rem;
      font-weight: 700;
    }
    .result-avg-ms {
      font-size: 2.5rem;
      font-weight: 700;
    }
    .result-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
    }
    .result-stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }
    .stat-value {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .round-times {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .round-badge {
      padding: 4px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
    }

    .nickname-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      text-align: center;
    }
    .nickname-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .result-btns {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Ranking */
    .ranking-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ranking-title {
      font-size: 1.1rem;
      font-weight: 700;
    }
    .rank-tabs {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }
    .rank-table {
      width: 100%;
      border-collapse: collapse;
    }
    .rank-table th {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      white-space: nowrap;
    }
    .rank-table td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      white-space: nowrap;
    }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-num { font-weight: 700; color: var(--text-muted); width: 32px; }
    .rank-num.top1 { color: #ffd700; }
    .rank-num.top2 { color: #c0c0c0; }
    .rank-num.top3 { color: #cd7f32; }
    .rank-empty {
      text-align: center;
      color: var(--text-muted);
      padding: 32px;
      font-size: 14px;
    }
    .rank-date {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .privacy-notice {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
      width: 100%;
    }
    .rank-table-wrap {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .rank-preview {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      font-size: 14px;
      color: var(--text-muted);
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

</head>
<body>
  <nav>
    <a class="home" href="index.html">← Just Play</a>
    <button class="lang-btn" id="langBtn">EN</button>
  </nav>

  <!-- Home -->
  <div class="screen active" id="screenHome">
    <div class="title" id="homeTitle">반응속도 테스트</div>
    <div class="subtitle" id="homeSubtitle">화면이 초록색으로 바뀌면 최대한 빠르게 클릭하세요<br>5라운드 평균으로 등급이 결정됩니다</div>
    <div class="home-btns">
      <button class="btn btn-primary" id="startBtn">시작</button>
      <button class="btn btn-secondary" id="rankingBtn">랭킹 보기</button>
    </div>
    <div class="info-card">
      <div class="info-card-title" id="gradeGuideTitle">등급 기준 (5회 평균)</div>
      <div id="gradeList"></div>
    </div>
    <div id="limitNote" style="margin:14px auto 0; font-size:12px; line-height:1.6; color:#888; text-align:center; max-width:360px;"></div>
  </div>

  <!-- Game -->
  <div class="screen" id="screenGame">
    <div class="game-header">
      <span class="round-label" id="roundLabel">라운드 1 / 5</span>
      <button class="btn btn-secondary quit-btn" id="quitBtn">그만하기</button>
    </div>
    <div class="progress-dots" id="progressDots"></div>
    <div id="gameArea">
      <div id="gameMessage">준비하세요</div>
      <div id="gameSubMessage"></div>
    </div>
    <div id="lastTimeDisplay"></div>
  </div>

  <!-- Result -->
  <div class="screen" id="screenResult">
    <div class="result-card">
      <div class="grade-emoji" id="resultEmoji">🥉</div>
      <div class="grade-label" id="resultGrade">브론즈</div>
      <div class="result-avg-ms" id="resultAvgMs">—</div>
      <div class="result-stats">
        <div class="result-stat">
          <span class="stat-label" id="bestLabel">최고</span>
          <span class="stat-value" id="resultBest">—</span>
        </div>
        <div class="result-stat">
          <span class="stat-label" id="avgLabel">평균</span>
          <span class="stat-value" id="resultAvgSmall">—</span>
        </div>
        <div class="result-stat">
          <span class="stat-label" id="worstLabel">최저</span>
          <span class="stat-value" id="resultWorst">—</span>
        </div>
      </div>
      <div class="round-times" id="roundTimes"></div>
    </div>
    <div id="rankPreview" class="rank-preview"></div>
    <div class="result-btns">
      <p class="privacy-notice" id="privacyNotice">⚠ 닉네임에 실명, 전화번호 등 개인정보를 입력하지 마세요. 등록된 닉네임은 랭킹에 공개됩니다.</p>
      <input class="nickname-input" type="text" id="nicknameInput" maxlength="12">
      <button class="btn btn-primary" id="submitBtn">랭킹에 등록</button>
      <button class="btn btn-secondary" id="viewRankingBtn">랭킹 보기</button>
      <button class="btn btn-secondary" id="retryBtn">다시 하기</button>
    </div>
  </div>

  <!-- Ranking -->
  <div class="screen" id="screenRanking">
    <div class="ranking-header">
      <span class="ranking-title" id="rankingTitle">랭킹</span>
      <button class="btn btn-secondary quit-btn" id="rankBackBtn">돌아가기</button>
    </div>
    <div id="adminBar" style="display:none; gap:8px; align-items:center; margin:0 0 14px; flex-wrap:wrap;">
      <input type="password" id="adminPwInput" class="nickname-input" style="max-width:200px;">
      <button class="btn btn-secondary" id="adminLoginBtn" style="width:auto;"></button>
      <button class="btn btn-secondary" id="adminLogoutBtn" style="width:auto; display:none;"></button>
      <span id="adminStatus" style="font-size:13px; color:#c8a96e;"></span>
    </div>
    <div class="rank-tabs">
      <button class="tab-btn active" data-tab="all" id="tabAll">전체</button>
      <button class="tab-btn" data-tab="today" id="tabToday">오늘</button>
    </div>
    <div class="rank-table-wrap">
    <table class="rank-table">
      <thead>
        <tr>
          <th id="rankColNum">#</th>
          <th id="rankColName">닉네임</th>
          <th id="rankColGrade">등급</th>
          <th id="rankColAvg">평균</th>
          <th id="rankColBest">최고</th>
          <th id="rankColDate">날짜</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>
    </div>
  </div>
