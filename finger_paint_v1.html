<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>그림 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#fffdf6;
  --ink:#4a4039;
  --dock:#fff;
  --line:#efe7da;
  --accent:#ff8a5b;
  --shadow:0 6px 18px rgba(120,90,60,.12);
}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Noto Sans KR',sans-serif;
  color:var(--ink);
  background:#fbeede;
  background-image:radial-gradient(circle at 20% 10%,#fff3e0 0,transparent 45%),
                   radial-gradient(circle at 85% 90%,#e9f6ff 0,transparent 45%);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
.jua{font-family:'Jua',sans-serif;font-weight:400}

/* ── 상단 바 ── */
.topbar{
  flex:0 0 auto;display:flex;align-items:center;gap:10px;
  padding:max(8px,env(safe-area-inset-top)) 14px 8px;
}
.topbar .title{font-family:'Jua',sans-serif;font-size:22px;color:var(--ink);letter-spacing:.02em}
.topbar .spacer{flex:1}
.icon-btn{
  width:42px;height:42px;border:none;border-radius:14px;background:var(--dock);
  box-shadow:var(--shadow);font-size:20px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;text-decoration:none;color:var(--ink);transition:transform .1s;
}
.icon-btn:active{transform:scale(.9)}

/* ── 그림 무대 ── */
.stage{flex:1 1 auto;min-height:0;padding:0 12px;display:flex}
.paper{
  position:relative;flex:1;border-radius:22px;overflow:hidden;
  background:var(--paper);
  background-image:
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.012) 0, transparent 60%),
    repeating-linear-gradient(0deg, rgba(0,0,0,.010) 0 1px, transparent 1px 4px);
  box-shadow:inset 0 0 0 4px #fff, var(--shadow);
  touch-action:none;
}
.paper canvas{position:absolute;inset:0;width:100%;height:100%;display:block;touch-action:none}
#live{pointer-events:auto}

.color-pop{
  position:absolute;top:12px;left:50%;transform:translateX(-50%) translateY(-12px);
  background:rgba(74,64,57,.92);color:#fff;font-family:'Jua',sans-serif;font-size:15px;
  padding:7px 16px;border-radius:999px;opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;z-index:5;
}
.color-pop.show{opacity:1;transform:translateX(-50%) translateY(0)}

.hint{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:10px;text-align:center;color:#b9ab98;pointer-events:none;
  font-family:'Jua',sans-serif;font-size:20px;transition:opacity .4s;padding:24px;
}
.hint .big{font-size:54px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* ── 하단 도구함 ── */
.dock{
  flex:0 0 auto;background:var(--dock);border-top-left-radius:24px;border-top-right-radius:24px;
  box-shadow:0 -6px 20px rgba(120,90,60,.10);
  padding:12px 12px max(12px,env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:10px;
}
.row{display:flex;align-items:center;gap:8px}
.row.scroll{overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.row.scroll::-webkit-scrollbar{display:none}
.row-label{font-family:'Jua',sans-serif;font-size:13px;color:#b9ab98;flex:0 0 auto;width:34px;text-align:center;line-height:1.1}

/* 물감 그릇(섞기) */
.bowl{
  flex:0 0 auto;width:54px;height:54px;border-radius:50%;
  border:4px solid #fff;box-shadow:var(--shadow),inset 0 -6px 10px rgba(0,0,0,.10);
  position:relative;transition:transform .12s;
}
.bowl.splash{animation:splash .3s ease}
@keyframes splash{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

/* 색 물감 버튼 */
.paint{
  flex:0 0 auto;width:42px;height:42px;border-radius:50%;border:3px solid #fff;
  box-shadow:var(--shadow);cursor:pointer;transition:transform .1s;position:relative;
}
.paint:active{transform:scale(.85)}

.mini{
  flex:0 0 auto;height:40px;padding:0 13px;border:none;border-radius:13px;background:#f4efe6;
  color:var(--ink);font-family:'Jua',sans-serif;font-size:14px;cursor:pointer;display:flex;
  align-items:center;gap:5px;transition:transform .1s,background .15s;white-space:nowrap;
}
.mini:active{transform:scale(.9)}
.mini.warn{background:#ffe6df}

/* 도구 버튼 */
.tool{
  flex:0 0 auto;width:48px;height:48px;border:3px solid transparent;border-radius:15px;
  background:#f4efe6;font-size:23px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:transform .1s,border-color .15s,background .15s;
}
.tool:active{transform:scale(.9)}
.tool.on{border-color:var(--accent);background:#fff3ec}

/* 붓 크기 */
.size{
  flex:0 0 auto;width:46px;height:46px;border:3px solid transparent;border-radius:15px;
  background:#f4efe6;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:transform .1s,border-color .15s,background .15s;
}
.size:active{transform:scale(.9)}
.size.on{border-color:var(--accent);background:#fff3ec}
.size .dot{border-radius:50%;background:var(--ink)}

/* 도장 고르기 */
.stamp-picker{
  position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(110%);
  background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.18);
  padding:18px 18px max(18px,env(safe-area-inset-bottom));display:flex;flex-wrap:wrap;gap:10px;
  justify-content:center;max-width:420px;width:100%;z-index:20;transition:transform .28s ease;
}
.stamp-picker.open{transform:translateX(-50%) translateY(0)}
.stamp-pick{
  width:54px;height:54px;border:none;border-radius:16px;background:#f4efe6;font-size:28px;
  cursor:pointer;transition:transform .1s}
.stamp-pick:active{transform:scale(.85)}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.25);opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:19}
.backdrop.open{opacity:1;pointer-events:auto}

@media (max-height:560px){
  .row-label{display:none}
  .bowl{width:46px;height:46px}
}
</style>

<body>

<div class="topbar">
  <a class="icon-btn" href="index.html" aria-label="처음으로">←</a>
  <div class="title jua">🎨 그림 놀이터</div>
  <div class="spacer"></div>
  <button class="icon-btn" id="muteBtn" aria-label="소리">🔊</button>
</div>

<div class="stage">
  <div class="paper" id="paperWrap">
    <canvas id="paper"></canvas>
    <canvas id="live"></canvas>
    <div class="color-pop" id="colorPop"></div>
    <div class="hint" id="hint">
      <div class="big">👆🎨</div>
      <div>물감을 골라 섞고<br>도화지에 쓱쓱 그려봐요!</div>
    </div>
  </div>
</div>

<div class="dock">
  <!-- 물감 섞기 -->
  <div class="row scroll" id="paletteRow">
    <span class="row-label">물감</span>
    <div class="bowl" id="bowl" title="섞은 색"></div>
    <!-- 물감 버튼은 JS로 생성 -->
    <button class="mini" id="clearBowl">🫗 새 물감</button>
  </div>

  <!-- 붓 크기 + 도구 -->
  <div class="row scroll">
    <span class="row-label">붓·도구</span>
    <button class="size on" data-size="14"><span class="dot" style="width:8px;height:8px"></span></button>
    <button class="size" data-size="30"><span class="dot" style="width:15px;height:15px"></span></button>
    <button class="size" data-size="56"><span class="dot" style="width:24px;height:24px"></span></button>
    <button class="tool" data-tool="pen" title="펜">✏️</button>
    <button class="tool on" data-tool="brush" title="붓"><svg viewBox="0 0 24 24" width="23" height="23" aria-hidden="true"><path fill="#5a4a3a" d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.21 0 4-1.79 4-4 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34a.9959.9959 0 0 0-1.41 0L9 12.25 11.75 15l8.96-8.96a.9959.9959 0 0 0 0-1.41z"/></svg></button>
    <button class="tool" data-tool="watercolor" title="수채화 붓">💧</button>
    <button class="tool" data-tool="rainbow" title="무지개 붓">🌈</button>
    <button class="tool" data-tool="glitter" title="반짝이">✨</button>
    <button class="tool" data-tool="stamp" title="도장">⭐</button>
    <button class="tool" data-tool="eraser" title="지우개">🧽</button>
  </div>

  <!-- 동작 -->
  <div class="row">
    <button class="mini" id="undoBtn">↩️ 되돌리기</button>
    <button class="mini warn" id="clearBtn">🗑️ 모두 지우기</button>
    <div style="flex:1"></div>
    <button class="mini" id="saveBtn" style="background:#dff5e3">💾 저장</button>
  </div>
</div>

<div class="backdrop" id="backdrop"></div>
<div class="stamp-picker" id="stampPicker"></div>
