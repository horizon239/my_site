<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트용 페이지</title>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js" integrity="sha384-/1qUCSGwTur9vjf/z9lmu/eCUYbpOTgSjmpbMQZ1/CtX2v/WcAIKqRv+U1DUCG6e" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111113;
    --border: rgba(255,255,255,0.07);
    --text: #e8e4dc;
    --muted: #666;
    --accent: #c8a96e;
    --danger: #d97757;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif;
    font-weight: 300;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px;
  }

  .back {
    align-self: flex-start;
    margin-bottom: 40px;
    color: var(--muted);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  .back:hover { color: var(--text); }

  h1 {
    font-size: 22px;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .desc {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 40px;
    text-align: center;
    line-height: 1.6;
  }

  .versions {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 360px;
  }

  .version-row {
    display: flex;
    align-items: stretch;
    gap: 8px;
  }

  .version-btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
  }
  .version-btn:hover {
    border-color: rgba(200,169,110,0.35);
    background: #16161a;
  }

  .version-btn .v-name {
    font-size: 15px;
    letter-spacing: 0.03em;
  }
  .version-btn .v-arrow {
    color: var(--accent);
    font-size: 13px;
  }

  .upload-btn {
    width: 52px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .upload-btn:hover {
    border-color: rgba(200,169,110,0.35);
    color: var(--accent);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    z-index: 20;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    width: 100%;
    max-width: 340px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
  }
  .modal h2 {
    font-size: 15px;
    letter-spacing: 0.05em;
    margin-bottom: 16px;
  }
  .modal label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .modal input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #0d0d0f;
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 14px;
  }
  .modal input[type="file"] {
    width: 100%;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .modal-btn {
    padding: 9px 16px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
  }
  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1a1a;
  }
  .modal-btn:disabled { opacity: 0.5; cursor: default; }

  .modal-status {
    margin-top: 12px;
    font-size: 12px;
    min-height: 16px;
  }
  .modal-status.error { color: var(--danger); }
  .modal-status.ok { color: #7ec98f; }
</style>
