<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소수 사냥 | Just Play</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2d3148;
      --accent: #7c6af7;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --cell-bg: #101320;
      --cell-border: #232640;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    nav {
      width: 100%; max-width: 520px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; margin-bottom: 8px;
    }
    .home-link { color: var(--text-muted); text-decoration: none; font-size: 14px; }
    .home-link:hover { color: var(--text); }
    .lang-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text-muted); padding: 4px 10px;
      border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--accent); }

    .screen { display: none; width: 100%; max-width: 520px; flex-direction: column; align-items: center; gap: 20px; }
    .screen.active { display: flex; }

    .title { font-size: 2rem; font-weight: 700; color: var(--accent); margin-top: 24px; text-align: center; }
    .subtitle { color: var(--text-muted); font-size: 14px; text-align: center; line-height: 1.8; white-space: pre-line; }

    .btn {
      padding: 14px 36px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .btn-sm { padding: 9px 18px; font-size: 14px; border-radius: 10px; }

    /* 난이도 카드 */
    .diff-cards { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .diff-card {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color 0.2s;
    }
    .diff-card:not(.locked):hover { border-color: var(--accent); }
    .diff-card.locked { opacity: 0.55; }
    .diff-badge {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .diff-badge-0 { background: rgba(34,197,94,0.15); }
    .diff-badge-1 { background: rgba(124,106,247,0.15); }
    .diff-badge-2 { background: rgba(239,68,68,0.15); }
    .diff-card-info { flex: 1; min-width: 0; }
    .diff-card-name { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
    .diff-card-range { font-size: 12px; color: var(--text-muted); margin-bottom: 2px; }
    .diff-card-best { font-size: 12px; color: var(--green); font-weight: 600; }
    .diff-card-lock { font-size: 12px; color: var(--text-muted); }

    .home-ranking-btn { width: 100%; max-width: 320px; }

    .info-card {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    }
    .info-card-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .info-card p { font-size: 13px; line-height: 1.7; color: var(--text-muted); white-space: pre-line; }

    /* 게임 헤더 */
    .game-header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
    }
    .quit-btn { padding: 6px 14px; font-size: 13px; }
    .diff-label {
      font-size: 12px; font-weight: 700; padding: 5px 12px;
      border-radius: 20px; border: 1px solid;
    }
    .diff-label-0 { color: var(--green);  border-color: var(--green);  background: rgba(34,197,94,0.1); }
    .diff-label-1 { color: var(--accent); border-color: var(--accent); background: rgba(124,106,247,0.1); }
    .diff-label-2 { color: var(--red);    border-color: var(--red);    background: rgba(239,68,68,0.1); }

    /* 스탯 박스 — 상단 컬러 라인으로 그리드와 구분 */
    .game-stats { width: 100%; display: flex; gap: 10px; }
    .stat-box {
      flex: 1; background: #0c0f1c;
      border: 1px solid var(--border); border-top: 3px solid transparent;
      border-radius: 10px; padding: 10px 8px; text-align: center;
    }
    .stat-box.s-time  { border-top-color: var(--accent); }
    .stat-box.s-found { border-top-color: var(--green); }
    .stat-box.s-wrong { border-top-color: var(--red); }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 1.2rem; font-weight: 700; }
    .stat-value.s-time  { color: var(--accent); }
    .stat-value.s-found { color: var(--green); }
    .stat-value.s-wrong { color: var(--red); }

    /* 그리드 — 스탯과 다른 배경 */
    .grid-wrap { width: 100%; border-radius: 12px; }
    @keyframes flashRed {
      0%   { background: transparent; }
      30%  { background: rgba(239,68,68,0.22); }
      100% { background: transparent; }
    }
    .grid-wrap.flash { animation: flashRed 0.35s ease; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; }
    .cell {
      aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
      font-size: clamp(14px, 3.5vw, 22px); font-weight: 700;
      border-radius: 10px; cursor: pointer;
      background: var(--cell-bg); border: 2px solid var(--cell-border);
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none; -webkit-user-select: none;
    }
    .cell:not(.found):hover {
      background: #1a1e38; border-color: var(--accent); transform: scale(1.06);
    }
    .cell.found {
      background: #14532d; border-color: var(--green);
      color: var(--green); cursor: default; transform: none;
    }

    .penalty-msg {
      font-size: 14px; color: var(--red); font-weight: 600;
      text-align: center; min-height: 22px;
    }

    /* 결과 */
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px 28px; width: 100%;
      text-align: center; display: flex; flex-direction: column; gap: 10px;
    }
    .result-emoji { font-size: 3rem; }
    .result-label { font-size: 13px; color: var(--text-muted); }
    .result-time  { font-size: 3rem; font-weight: 700; color: var(--accent); }
    .result-wrong { font-size: 15px; color: var(--text-muted); }
    .result-unlock { font-size: 14px; color: var(--green); font-weight: 700; min-height: 22px; }
    .result-btns { width: 100%; display: flex; flex-direction: column; gap: 10px; }
    .nickname-input {
      width: 100%; padding: 12px 16px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 16px; text-align: center;
    }
    .nickname-input:focus { outline: none; border-color: var(--accent); }
    .privacy-notice {
      font-size: 12px; color: var(--text-muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; line-height: 1.6; width: 100%;
    }

    /* 랭킹 */
    .ranking-header {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
    }
    .ranking-title { font-size: 1.1rem; font-weight: 700; }
    .rank-tabs { display: flex; gap: 8px; width: 100%; }
    .tab-btn {
      flex: 1; padding: 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-muted); cursor: pointer; font-size: 14px;
    }
    .tab-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .rank-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      font-size: 12px; color: var(--text-muted); padding: 8px 10px;
      text-align: left; border-bottom: 1px solid var(--border);
      font-weight: 500; white-space: nowrap;
    }
    .rank-table td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 14px; white-space: nowrap; }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-num { font-weight: 700; color: var(--text-muted); }
    .rank-num.top1 { color: #ffd700; }
    .rank-num.top2 { color: #c0c0c0; }
    .rank-num.top3 { color: #cd7f32; }
    .rank-date { font-size: 12px; color: var(--text-muted); }
    .rank-empty { text-align: center; color: var(--text-muted); padding: 32px; font-size: 14px; }
  </style>

  <nav>
    <a class="home-link" href="index.html">← Just Play</a>
    <button class="lang-btn" id="langBtn">EN</button>
  </nav>

  <!-- 홈 -->
  <div class="screen active" id="screenHome">
    <div class="title" id="homeTitle">소수 사냥</div>
    <div class="subtitle" id="homeSubtitle"></div>
    <div class="diff-cards">
      <div class="diff-card" id="diffCard0">
        <div class="diff-badge diff-badge-0">🟢</div>
        <div class="diff-card-info">
          <div class="diff-card-name" id="diffName0"></div>
          <div class="diff-card-range">1 ~ 99</div>
          <div class="diff-card-best" id="diffBest0"></div>
          <div class="diff-card-lock" id="diffLock0"></div>
        </div>
        <button class="btn btn-sm btn-primary" id="diffBtn0"></button>
      </div>
      <div class="diff-card locked" id="diffCard1">
        <div class="diff-badge diff-badge-1">🟣</div>
        <div class="diff-card-info">
          <div class="diff-card-name" id="diffName1"></div>
          <div class="diff-card-range">1 ~ 200</div>
          <div class="diff-card-best" id="diffBest1"></div>
          <div class="diff-card-lock" id="diffLock1"></div>
        </div>
        <button class="btn btn-sm btn-secondary" id="diffBtn1" disabled></button>
      </div>
      <div class="diff-card locked" id="diffCard2">
        <div class="diff-badge diff-badge-2">🔴</div>
        <div class="diff-card-info">
          <div class="diff-card-name" id="diffName2"></div>
          <div class="diff-card-range">100 ~ 300</div>
          <div class="diff-card-best" id="diffBest2"></div>
          <div class="diff-card-lock" id="diffLock2"></div>
        </div>
        <button class="btn btn-sm btn-secondary" id="diffBtn2" disabled></button>
      </div>
    </div>
    <button class="btn btn-secondary home-ranking-btn" id="rankingBtn"></button>
    <div class="info-card">
      <div class="info-card-title" id="infoTitle"></div>
      <p id="infoDesc"></p>
    </div>
  </div>

  <!-- 게임 -->
  <div class="screen" id="screenGame">
    <div class="game-header">
      <span class="diff-label diff-label-0" id="gameDiffLabel"></span>
      <button class="btn btn-secondary quit-btn" id="quitBtn"></button>
    </div>
    <div class="game-stats">
      <div class="stat-box s-time">
        <div class="stat-label" id="statTimerLabel"></div>
        <div class="stat-value s-time" id="statTimer">0.00</div>
      </div>
      <div class="stat-box s-found">
        <div class="stat-label" id="statFoundLabel"></div>
        <div class="stat-value s-found" id="statFound">0 / 5</div>
      </div>
      <div class="stat-box s-wrong">
        <div class="stat-label" id="statWrongLabel"></div>
        <div class="stat-value s-wrong" id="statWrong">0</div>
      </div>
    </div>
    <div class="grid-wrap" id="gridWrap">
      <div class="grid" id="grid"></div>
    </div>
    <div class="penalty-msg" id="penaltyMsg"></div>
  </div>

  <!-- 결과 -->
  <div class="screen" id="screenResult">
    <div class="result-card">
      <div class="result-emoji">🎉</div>
      <div class="result-label" id="resultLabel"></div>
      <div class="result-time" id="resultTime">—</div>
      <div class="result-wrong" id="resultWrong"></div>
      <div class="result-unlock" id="resultUnlock"></div>
    </div>
    <div class="result-btns">
      <p class="privacy-notice" id="privacyNotice"></p>
      <input class="nickname-input" type="text" id="nicknameInput" maxlength="12">
      <button class="btn btn-primary" id="submitBtn"></button>
      <button class="btn btn-secondary" id="viewRankingBtn"></button>
      <button class="btn btn-secondary" id="retryBtn"></button>
    </div>
  </div>

  <!-- 랭킹 -->
  <div class="screen" id="screenRanking">
    <div class="ranking-header">
      <span class="ranking-title" id="rankingTitle"></span>
      <button class="btn btn-secondary quit-btn" id="rankBackBtn"></button>
    </div>
    <div id="adminBar" style="display:none; gap:8px; align-items:center; margin:0 0 14px; flex-wrap:wrap;">
      <input type="password" id="adminPwInput" class="nickname-input" style="max-width:200px;">
      <button class="btn btn-secondary" id="adminLoginBtn" style="width:auto;"></button>
      <button class="btn btn-secondary" id="adminLogoutBtn" style="width:auto; display:none;"></button>
      <span id="adminStatus" style="font-size:13px; color:#c8a96e;"></span>
    </div>
    <div class="rank-tabs">
      <button class="tab-btn active" data-diff="0" id="rankTab0"></button>
      <button class="tab-btn"        data-diff="1" id="rankTab1"></button>
      <button class="tab-btn"        data-diff="2" id="rankTab2"></button>
    </div>
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th id="rankColNum">#</th>
            <th id="rankColName"></th>
            <th id="rankColTime"></th>
            <th id="rankColWrong"></th>
            <th id="rankColDate"></th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>
