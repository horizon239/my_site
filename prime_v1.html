<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소수 사냥 | Just Play</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2d3148;
      --accent: #7c6af7;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
    }
    nav {
      width: 100%;
      max-width: 520px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 8px;
    }
    .home-link { color: var(--text-muted); text-decoration: none; font-size: 14px; }
    .home-link:hover { color: var(--text); }
    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .lang-btn:hover { color: var(--text); border-color: var(--accent); }

    .screen { display: none; width: 100%; max-width: 520px; flex-direction: column; align-items: center; gap: 20px; }
    .screen.active { display: flex; }

    .title { font-size: 2rem; font-weight: 700; color: var(--accent); margin-top: 24px; text-align: center; }
    .subtitle { color: var(--text-muted); font-size: 14px; text-align: center; line-height: 1.8; white-space: pre-line; }

    .btn {
      padding: 14px 36px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .home-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 280px; }

    .info-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .info-card-title { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .info-card p { font-size: 13px; line-height: 1.7; color: var(--text-muted); white-space: pre-line; }

    /* Game */
    .game-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .quit-btn { padding: 6px 14px; font-size: 13px; }

    .game-stats { width: 100%; display: flex; gap: 10px; }
    .stat-box {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .stat-value { font-size: 1.2rem; font-weight: 700; }

    .grid-wrap { width: 100%; border-radius: 12px; }

    @keyframes flashRed {
      0%   { background: transparent; }
      30%  { background: rgba(239,68,68,0.22); }
      100% { background: transparent; }
    }
    .grid-wrap.flash { animation: flashRed 0.35s ease; }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      width: 100%;
    }
    .cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 3.5vw, 22px);
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      background: var(--surface);
      border: 2px solid var(--border);
      transition: background 0.12s, border-color 0.12s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }
    .cell:not(.found):not(.locked-cell):hover {
      background: #222540;
      border-color: var(--accent);
      transform: scale(1.06);
    }
    .cell.found {
      background: #14532d;
      border-color: var(--green);
      color: var(--green);
      cursor: default;
      transform: none;
    }

    .penalty-msg {
      font-size: 14px;
      color: var(--red);
      font-weight: 600;
      text-align: center;
      min-height: 22px;
    }

    /* Result */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .result-emoji { font-size: 3rem; }
    .result-label { font-size: 13px; color: var(--text-muted); }
    .result-time { font-size: 3rem; font-weight: 700; color: var(--accent); }
    .result-wrong { font-size: 15px; color: var(--text-muted); }

    .result-btns { width: 100%; display: flex; flex-direction: column; gap: 10px; }

    .nickname-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 16px;
      text-align: center;
    }
    .nickname-input:focus { outline: none; border-color: var(--accent); }

    .privacy-notice {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      line-height: 1.6;
      width: 100%;
    }

    /* Ranking */
    .ranking-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .ranking-title { font-size: 1.1rem; font-weight: 700; }
    .rank-tabs { display: flex; gap: 8px; width: 100%; }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .rank-table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      white-space: nowrap;
    }
    .rank-table td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      white-space: nowrap;
    }
    .rank-table tr:last-child td { border-bottom: none; }
    .rank-num { font-weight: 700; color: var(--text-muted); }
    .rank-num.top1 { color: #ffd700; }
    .rank-num.top2 { color: #c0c0c0; }
    .rank-num.top3 { color: #cd7f32; }
    .rank-date { font-size: 12px; color: var(--text-muted); }
    .rank-empty { text-align: center; color: var(--text-muted); padding: 32px; font-size: 14px; }
  </style>

</head>
<body>
  <nav>
    <a class="home-link" href="index.html">← Just Play</a>
    <button class="lang-btn" id="langBtn">EN</button>
  </nav>

  <!-- Home -->
  <div class="screen active" id="screenHome">
    <div class="title" id="homeTitle">소수 사냥</div>
    <div class="subtitle" id="homeSubtitle"></div>
    <div class="home-btns">
      <button class="btn btn-primary" id="startBtn">시작</button>
      <button class="btn btn-secondary" id="rankingBtn">랭킹 보기</button>
    </div>
    <div class="info-card">
      <div class="info-card-title" id="infoTitle">소수란?</div>
      <p id="infoDesc"></p>
    </div>
  </div>

  <!-- Game -->
  <div class="screen" id="screenGame">
    <div class="game-header">
      <span style="font-size:14px;color:var(--text-muted)" id="gameLabel"></span>
      <button class="btn btn-secondary quit-btn" id="quitBtn">그만하기</button>
    </div>
    <div class="game-stats">
      <div class="stat-box">
        <div class="stat-label" id="statTimerLabel">시간</div>
        <div class="stat-value" id="statTimer">0.00</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" id="statFoundLabel">발견</div>
        <div class="stat-value" id="statFound">0 / 5</div>
      </div>
      <div class="stat-box">
        <div class="stat-label" id="statWrongLabel">오답</div>
        <div class="stat-value" id="statWrong">0</div>
      </div>
    </div>
    <div class="grid-wrap" id="gridWrap">
      <div class="grid" id="grid"></div>
    </div>
    <div class="penalty-msg" id="penaltyMsg"></div>
  </div>

  <!-- Result -->
  <div class="screen" id="screenResult">
    <div class="result-card">
      <div class="result-emoji">🎉</div>
      <div class="result-label" id="resultLabel">완료!</div>
      <div class="result-time" id="resultTime">—</div>
      <div class="result-wrong" id="resultWrong"></div>
    </div>
    <div class="result-btns">
      <p class="privacy-notice" id="privacyNotice"></p>
      <input class="nickname-input" type="text" id="nicknameInput" maxlength="12">
      <button class="btn btn-primary" id="submitBtn">랭킹에 등록</button>
      <button class="btn btn-secondary" id="viewRankingBtn">랭킹 보기</button>
      <button class="btn btn-secondary" id="retryBtn">다시 하기</button>
    </div>
  </div>

  <!-- Ranking -->
  <div class="screen" id="screenRanking">
    <div class="ranking-header">
      <span class="ranking-title" id="rankingTitle">랭킹</span>
      <button class="btn btn-secondary quit-btn" id="rankBackBtn">돌아가기</button>
    </div>
    <div class="rank-tabs">
      <button class="tab-btn active" data-tab="all" id="tabAll">전체</button>
      <button class="tab-btn" data-tab="today" id="tabToday">오늘</button>
    </div>
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th id="rankColNum">#</th>
            <th id="rankColName">닉네임</th>
            <th id="rankColTime">시간</th>
            <th id="rankColWrong">오답</th>
            <th id="rankColDate">날짜</th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>
