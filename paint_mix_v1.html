<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Paint Mixer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fef9ef;--surface:#fff;--border:#e8e0d0;
  --text:#3d3027;--muted:#8a7e72;--accent:#FF9F43;
  --red:#E84040;--yellow:#F7D02C;--blue:#3B7DD8;
  --white:#F5F0E8;--black:#2C2520;
}
html,body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',sans-serif;font-weight:400;
  overflow-x:hidden;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none
}
body{
  background:linear-gradient(170deg,#fef9ef 0%,#fdecd0 40%,#f8e8d6 100%);
}

.app{
  position:relative;z-index:1;max-width:480px;margin:0 auto;
  padding:14px 16px 30px;min-height:100vh;display:flex;flex-direction:column
}

/* 헤더 */
.home-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:12px;color:#aaa;text-decoration:none;
  background:rgba(255,255,255,0.6);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;margin-bottom:10px;
  transition:color 0.2s;align-self:flex-start
}
.home-btn:hover{color:var(--accent)}

.header{text-align:center;margin-bottom:16px}
.header-icon{font-size:36px}
.header h1{
  font-family:'Noto Sans KR',sans-serif;font-weight:900;
  font-size:26px;color:var(--text);line-height:1.2;margin:4px 0 0
}
.header-sub{font-size:14px;color:var(--muted);margin:4px 0 0}

/* 모드 탭 */
.mode-tabs{
  display:flex;gap:8px;margin-bottom:16px;justify-content:center
}
.mode-tab{
  padding:9px 20px;border:2px solid var(--border);border-radius:50px;
  background:rgba(255,255,255,0.7);cursor:pointer;font-size:14px;
  font-weight:500;color:var(--muted);transition:all 0.2s;
  font-family:'Noto Sans KR',sans-serif
}
.mode-tab:hover{border-color:var(--accent);color:var(--text)}
.mode-tab.active{
  background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700
}

/* 물감 튜브 영역 */
.tubes-section{
  background:rgba(255,255,255,0.85);border:2px solid var(--border);
  border-radius:20px;padding:16px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.04)
}
.tubes-label{
  font-size:11px;color:var(--muted);letter-spacing:0.1em;
  font-weight:500;margin-bottom:10px;text-align:center
}
.tubes-row{
  display:flex;justify-content:center;gap:10px;flex-wrap:wrap
}

/* 물감 튜브 */
.tube{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  cursor:pointer;transition:transform 0.15s;position:relative
}
.tube:active{transform:scale(0.9)}
.tube-body{
  width:44px;height:60px;border-radius:8px 8px 14px 14px;
  position:relative;overflow:hidden;
  box-shadow:0 3px 10px rgba(0,0,0,0.15),inset 0 -4px 8px rgba(0,0,0,0.15);
  transition:transform 0.2s
}
.tube-cap{
  width:24px;height:12px;border-radius:4px 4px 0 0;
  background:rgba(0,0,0,0.15);margin:0 auto -2px;position:relative;z-index:1
}
.tube-shine{
  position:absolute;top:4px;left:6px;width:10px;height:30px;
  background:linear-gradient(180deg,rgba(255,255,255,0.5),transparent);
  border-radius:4px
}
.tube-label{
  font-size:10px;color:var(--muted);font-weight:500;text-align:center
}
.tube-count{
  position:absolute;top:-6px;right:-6px;
  background:var(--accent);color:#fff;font-size:10px;font-weight:700;
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
  opacity:0;transform:scale(0);transition:all 0.2s
}
.tube-count.show{opacity:1;transform:scale(1)}

/* 혼합 그릇 */
.bowl-section{
  display:flex;flex-direction:column;align-items:center;margin-bottom:14px
}
.bowl-wrap{
  position:relative;width:200px;height:200px;margin:0 auto
}
.bowl{
  width:200px;height:200px;border-radius:50%;
  background:radial-gradient(ellipse at 40% 35%,rgba(255,255,255,0.6),rgba(200,190,175,0.3));
  border:3px solid rgba(0,0,0,0.08);
  box-shadow:
    0 8px 30px rgba(0,0,0,0.1),
    inset 0 4px 20px rgba(0,0,0,0.05),
    inset 0 -6px 12px rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;position:relative;
  transition:border-color 0.3s
}
.bowl-paint{
  width:160px;height:160px;border-radius:50%;
  transition:background-color 0.5s ease;
  box-shadow:inset 0 4px 15px rgba(0,0,0,0.12),inset 0 -3px 8px rgba(255,255,255,0.15);
  position:relative
}
.bowl-paint.empty{
  background:transparent !important;box-shadow:none
}
.bowl-paint-shine{
  position:absolute;top:20px;left:30px;
  width:50px;height:30px;
  background:radial-gradient(ellipse,rgba(255,255,255,0.35),transparent);
  border-radius:50%;pointer-events:none
}
.bowl-hint{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:14px;color:#bbb;text-align:center;pointer-events:none;
  transition:opacity 0.3s
}

/* 드롭 애니메이션 */
.paint-drop{
  position:absolute;width:30px;height:30px;border-radius:50%;
  pointer-events:none;z-index:10;
  animation:dropFall 0.5s ease-in forwards
}
@keyframes dropFall{
  0%{transform:scale(1) translateY(0);opacity:1}
  60%{transform:scale(0.8) translateY(80px);opacity:1}
  100%{transform:scale(1.5) translateY(100px);opacity:0}
}

/* 물감 튀는 효과 */
.paint-splash{
  position:absolute;border-radius:50%;pointer-events:none;z-index:5;
  animation:splash 0.4s ease-out forwards
}
@keyframes splash{
  0%{transform:scale(0);opacity:0.7}
  100%{transform:scale(1);opacity:0}
}

/* 버튼 영역 */
.actions{
  display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap
}
.btn{
  padding:10px 22px;border:2px solid var(--border);border-radius:50px;
  background:rgba(255,255,255,0.85);cursor:pointer;font-size:14px;
  font-weight:600;color:var(--text);transition:all 0.2s;
  font-family:'Noto Sans KR',sans-serif;
  box-shadow:0 3px 10px rgba(0,0,0,0.05)
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn:active{transform:scale(0.95)}
.btn-primary{
  background:var(--accent);color:#fff;border-color:var(--accent)
}
.btn-primary:hover{background:#e8913a;color:#fff}

/* 결과 표시 */
.result-section{
  background:rgba(255,255,255,0.85);border:2px solid var(--border);
  border-radius:20px;padding:16px;margin-bottom:14px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.04);
  min-height:60px;display:flex;flex-direction:column;
  align-items:center;justify-content:center
}
.result-name{
  font-size:22px;font-weight:700;margin-bottom:4px;
  transition:all 0.3s
}
.result-recipe{font-size:12px;color:var(--muted)}
.result-new{
  display:inline-block;padding:3px 10px;border-radius:20px;
  background:#2ED573;color:#fff;font-size:12px;font-weight:700;
  margin-bottom:6px;animation:popIn 0.4s cubic-bezier(0.2,1.2,0.4,1)
}
@keyframes popIn{
  0%{transform:scale(0)}
  100%{transform:scale(1)}
}

/* 컬렉션 */
.collection{
  background:rgba(255,255,255,0.85);border:2px solid var(--border);
  border-radius:20px;padding:16px;
  box-shadow:0 4px 20px rgba(0,0,0,0.04)
}
.collection-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:12px
}
.collection-title{font-size:13px;font-weight:600;color:var(--text)}
.collection-count{
  font-size:12px;color:var(--accent);font-weight:700
}
.collection-grid{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center
}
.color-chip{
  width:38px;height:38px;border-radius:50%;
  border:2px solid rgba(0,0,0,0.08);
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:relative;cursor:default;
  transition:transform 0.2s
}
.color-chip:hover{transform:scale(1.15)}
.color-chip.locked{
  background:#e8e0d0 !important;opacity:0.4;
  border-style:dashed
}
.color-chip-label{
  position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);
  font-size:9px;color:var(--muted);white-space:nowrap;
  opacity:0;transition:opacity 0.2s;pointer-events:none
}
.color-chip:hover .color-chip-label{opacity:1}

/* 퀴즈 모드 */
.quiz-section{
  background:rgba(255,255,255,0.85);border:2px solid var(--border);
  border-radius:20px;padding:20px;margin-bottom:14px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,0.04)
}
.quiz-prompt{font-size:16px;font-weight:600;margin-bottom:12px}
.quiz-target{
  width:80px;height:80px;border-radius:50%;margin:0 auto 12px;
  border:3px solid rgba(0,0,0,0.1);
  box-shadow:0 4px 15px rgba(0,0,0,0.12)
}
.quiz-target-name{
  font-size:18px;font-weight:700;margin-bottom:4px
}
.quiz-score{
  font-size:13px;color:var(--muted);margin-bottom:8px
}
.quiz-feedback{
  font-size:24px;margin:10px 0;min-height:40px
}
.quiz-difficulty{
  display:flex;gap:6px;justify-content:center;margin-bottom:12px
}
.diff-btn{
  padding:6px 14px;border:2px solid var(--border);border-radius:20px;
  background:rgba(255,255,255,0.7);cursor:pointer;font-size:12px;
  font-weight:500;color:var(--muted);transition:all 0.2s;
  font-family:'Noto Sans KR',sans-serif
}
.diff-btn:hover{border-color:var(--accent)}
.diff-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* 컨페티 */
.confetti{
  position:fixed;top:-10px;pointer-events:none;z-index:999;
  font-size:20px;
  animation:confettiFall 2s ease-in forwards
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* 반응형 */
@media(max-width:400px){
  .tube-body{width:38px;height:52px}
  .bowl-wrap,.bowl{width:170px;height:170px}
  .bowl-paint{width:136px;height:136px}
  .header h1{font-size:22px}
}
</style>

<body>

<div class="app">
  <a class="home-btn" href="index.html" id="txtHome">← Just Play</a>

  <div class="header">
    <div class="header-icon">🎨</div>
    <h1 id="txtTitle">물감놀이</h1>
    <p class="header-sub" id="txtSub">물감을 섞어서 새로운 색을 만들어봐요!</p>
  </div>

  <!-- 모드 탭 -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="free" onclick="setMode('free')" id="tabFree">🎨 자유놀이</button>
    <button class="mode-tab" data-mode="quiz" onclick="setMode('quiz')" id="tabQuiz">🧩 색 맞추기</button>
  </div>

  <!-- 퀴즈 영역 (퀴즈 모드에서만 보임) -->
  <div class="quiz-section" id="quizSection" style="display:none">
    <div class="quiz-difficulty">
      <button class="diff-btn active" data-diff="0" onclick="setDifficulty(0)" id="diff0">쉬움</button>
      <button class="diff-btn" data-diff="1" onclick="setDifficulty(1)" id="diff1">보통</button>
      <button class="diff-btn" data-diff="2" onclick="setDifficulty(2)" id="diff2">어려움</button>
    </div>
    <div class="quiz-prompt" id="quizPrompt">이 색을 만들어봐!</div>
    <div class="quiz-target" id="quizTarget"></div>
    <div class="quiz-target-name" id="quizTargetName"></div>
    <div class="quiz-score" id="quizScore"></div>
    <div class="quiz-feedback" id="quizFeedback"></div>
  </div>

  <!-- 물감 튜브 -->
  <div class="tubes-section">
    <div class="tubes-label" id="lblTubes">물감을 터치해서 그릇에 넣으세요</div>
    <div class="tubes-row" id="tubesRow"></div>
  </div>

  <!-- 혼합 그릇 -->
  <div class="bowl-section">
    <div class="bowl-wrap" id="bowlWrap">
      <div class="bowl" id="bowl">
        <div class="bowl-paint empty" id="bowlPaint">
          <div class="bowl-paint-shine"></div>
        </div>
        <div class="bowl-hint" id="bowlHint">물감을 넣어주세요</div>
      </div>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="actions">
    <button class="btn" onclick="resetBowl()" id="btnReset">🔄 다시 섞기</button>
    <button class="btn btn-primary" onclick="submitQuiz()" id="btnSubmit" style="display:none">✅ 제출!</button>
  </div>

  <!-- 결과 -->
  <div class="result-section" id="resultSection">
    <div id="resultNew"></div>
    <div class="result-name" id="resultName">—</div>
    <div class="result-recipe" id="resultRecipe"></div>
  </div>

  <!-- 컬렉션 -->
  <div class="collection" id="collectionSection">
    <div class="collection-header">
      <span class="collection-title" id="lblCollection">🏆 발견한 색</span>
      <span class="collection-count" id="collectionCount">0 / 21</span>
    </div>
    <div class="collection-grid" id="collectionGrid"></div>
  </div>
