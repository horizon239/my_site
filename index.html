    function tx(key, lang) { const v = I[key]; if (!v) return key; return v[lang] || v.en || key; }

    function fmtTime(h, m, lang) {
      if (lang === "ko") return h + "시 " + (m === 0 ? "정각" : m + "분");
      if (lang === "ja") return h + "時" + (m === 0 ? "ちょうど" : m + "分");
      if (lang === "zh") return h + "点" + (m === 0 ? "整" : m + "分");
      return h + ":" + String(m).padStart(2, "0");
    }

    const LESSONS = {

    const HC = "#FF6348", MC = "#3742FA", AC = "#FF9F43", SC = "#2ED573";

    function rand(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }
    function shuf(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [b[i], b[j]] = [b[j], b[i]]; } return b; }
    function aToM(a) { return Math.round((((a % 360) + 360) % 360) / 6) % 60; }
    function aToH(a) { let h = Math.round((((a % 360) + 360) % 360) / 30) % 12; return h === 0 ? 12 : h; }

    function useClockSize(ratio) {
      const calc = () => {
        const w = Math.min(window.innerWidth - 32, 600);
        const h = window.innerHeight;
        const phoneMax = h < 750 ? h * 0.36 : h < 950 ? h * 0.4 : w;
        return Math.round(Math.min(w * (ratio || 0.92), phoneMax));
      };
      const [s, setS] = useState(calc);
      useEffect(() => {
        const fn = () => setS(calc());
        window.addEventListener("resize", fn);
        return () => window.removeEventListener("resize", fn);
      }, [ratio]);
      return s;
    }

    function LangPicker({ lang, setLang }) {
      const [open, setOpen] = useState(false);
      const cur = LANGS.find(l => l.code === lang);
      return (
        <div style={{ position: "fixed", top: 10, right: 10, zIndex: 9999 }}>
          <button onClick={() => setOpen(!open)} style={{
            display: "flex", alignItems: "center", gap: 6, padding: "7px 12px",
            background: "rgba(255,255,255,0.95)", border: "2px solid #e0d6c8",

            boxShadow: "0 3px 12px rgba(0,0,0,0.1)",

            <span style={{ color: "#3d3027", fontWeight: 600 }}>{cur.name}</span>

                    background: lang === l.code ? (AC + "20") : "transparent",

                    <span style={{ fontSize: 20 }}>{l.flag}</span>
                    <span style={{ color: "#3d3027", fontWeight: lang === l.code ? 700 : 400 }}>{l.name}</span>
                    {lang === l.code && <span style={{ marginLeft: "auto", color: AC }}>✓</span>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );

    function Clock({ hour, minute, size = 300, showMin = true, hl = "both", drag = false, onChange, digital = true, fiveL = false, lang = "en" }) {
      const ref = useRef(null);
      const dRef = useRef(null);
      const prevMinRef = useRef(minute);
      const hourRef = useRef(hour);
      const cx = size / 2, cy = size / 2, r = size * 0.38;
      const hA = (hour % 12) * 30 + minute * 0.5, mA = minute * 6;

      useEffect(() => { prevMinRef.current = minute; }, [minute]);
      useEffect(() => { hourRef.current = hour; }, [hour]);

      const getA = (e) => {
        const rect = ref.current.getBoundingClientRect();
        const px = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const py = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
        let a = Math.atan2(py - rect.height / 2, px - rect.width / 2) * (180 / Math.PI) + 90;
        return ((a % 360) + 360) % 360;
      };

      const onS = (hand) => (e) => { if (!drag) return; e.preventDefault(); e.stopPropagation(); dRef.current = hand; };

      useEffect(() => {
        if (!drag) return;
        const mv = (e) => {
          if (!dRef.current || !ref.current || !onChange) return;
          e.preventDefault();
          const a = getA(e);
          if (dRef.current === "minute") {
            const newMin = aToM(a);
            const prevMin = prevMinRef.current;
            let h = hourRef.current;
            if (prevMin > 45 && newMin < 15) {
              h = (h % 12) + 1;
              if (h > 12) h = 1;
            } else if (prevMin < 15 && newMin > 45) {
              h = h - 1;
              if (h < 1) h = 12;
            }
            prevMinRef.current = newMin;
            hourRef.current = h;
            onChange(h, newMin);
          } else {
            onChange(aToH(a), prevMinRef.current);
          }
        };
        const up = () => { dRef.current = null; };
        const o = { passive: false };
        window.addEventListener("mousemove", mv, o);
        window.addEventListener("mouseup", up);
        window.addEventListener("touchmove", mv, o);
        window.addEventListener("touchend", up);
        return () => { window.removeEventListener("mousemove", mv); window.removeEventListener("mouseup", up); window.removeEventListener("touchmove", mv); window.removeEventListener("touchend", up); };
      }, [drag, onChange]);

      const hand = (angle, len, color, w, id) => {
        const rad = ((angle - 90) * Math.PI) / 180;
        const x2 = cx + Math.cos(rad) * len, y2 = cy + Math.sin(rad) * len;
        const dim = hl !== "both" && hl !== id;
        return (
          <g>
            <line x1={cx + 1} y1={cy + 1} x2={x2 + 1} y2={y2 + 1} stroke="rgba(0,0,0,0.1)" strokeWidth={w + 2} strokeLinecap="round" />
            <line x1={cx} y1={cy} x2={x2} y2={y2} stroke={color} strokeWidth={w} strokeLinecap="round"
              opacity={dim ? 0.2 : 1} style={{ cursor: drag ? "grab" : "default", transition: drag ? "none" : "all 0.5s ease" }}
              onMouseDown={onS(id)} onTouchStart={onS(id)} />
            {drag && <circle cx={x2} cy={y2} r={24} fill="transparent" style={{ cursor: "grab" }} onMouseDown={onS(id)} onTouchStart={onS(id)} />}
          </g>
        );
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
          <svg ref={ref} width={size} height={size} viewBox={"0 0 " + size + " " + size} style={{ filter: "drop-shadow(0 6px 20px rgba(0,0,0,0.1))", touchAction: "none" }}>
            <circle cx={cx} cy={cy} r={r + 12} fill="#f0ebe3" />
            <circle cx={cx} cy={cy} r={r + 6} fill="#FFFDF7" stroke="#e8e0d4" strokeWidth={2} />
            {Array.from({ length: 60 }).map((_, i) => {
              const hr = i % 5 === 0;
              const rad = ((i * 6 - 90) * Math.PI) / 180;
              return <line key={i} x1={cx + Math.cos(rad) * (r - (hr ? 14 : 6))} y1={cy + Math.sin(rad) * (r - (hr ? 14 : 6))} x2={cx + Math.cos(rad) * (r - 1)} y2={cy + Math.sin(rad) * (r - 1)} stroke={hr ? "#5a5049" : "#ccc"} strokeWidth={hr ? 2.5 : 1} />;
            })}
            {Array.from({ length: 12 }).map((_, i) => {
              const n = i + 1, rad = ((n * 30 - 90) * Math.PI) / 180;
              return <text key={n} x={cx + Math.cos(rad) * (r - 30)} y={cy + Math.sin(rad) * (r - 30)} textAnchor="middle" dominantBaseline="central" fill="#3d3027" fontSize={size * 0.072} fontFamily="'Gaegu', cursive" fontWeight="700">{n}</text>;
            })}
            {fiveL && Array.from({ length: 12 }).map((_, i) => {
              const n = i + 1, ms = (n * 5) % 60, rad = ((n * 30 - 90) * Math.PI) / 180;
              return <text key={"m" + n} x={cx + Math.cos(rad) * (r + 24)} y={cy + Math.sin(rad) * (r + 24)} textAnchor="middle" dominantBaseline="central" fill={MC} fontSize={size * 0.042} fontWeight="700" opacity={0.75}>{ms}</text>;
            })}
            {showMin && hand(mA, r * 0.78, MC, 4.5, "minute")}
            {hand(hA, r * 0.52, HC, 7.5, "hour")}
            <circle cx={cx} cy={cy} r={6} fill="#3d3027" />
            <circle cx={cx} cy={cy} r={3} fill="#fff" />
          </svg>
          <div style={{ display: "flex", gap: 14, fontSize: 15, fontWeight: 600 }}>
            <span style={{ color: HC, fontWeight: 700 }}>● {tx("hourH", lang)}</span>
            {showMin && <span style={{ color: MC, fontWeight: 700 }}>● {tx("minH", lang)}</span>}
          </div>
          {digital && <div style={{ background: "#1e272e", borderRadius: 16, padding: "12px 28px", fontFamily: "'Bagel Fat One', cursive", fontSize: 34, color: "#7bed9f", letterSpacing: 4, boxShadow: "inset 0 2px 8px rgba(0,0,0,0.5)", border: "3px solid #3d3027" }}>
            {hour} : {String(minute).padStart(2, "0")}
          </div>}
        </div>
      );
    }

    function LearnMode({ lang, onHome }) {
      const [step, setStep] = useState(0);
      const clockSize = useClockSize(0.82);
      const lessons = LESSONS[lang] || LESSONS.en;
      const ls = lessons[step];
      return (
        <div style={{ textAlign: "center", padding: "0 16px" }}>
          <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 20 }}>
            {lessons.map((_, i) => <div key={i} style={{ width: 36, height: 6, borderRadius: 3, background: i <= step ? AC : "#e0d6c8", transition: "all 0.3s" }} />)}
          </div>
          <h2 style={{ fontFamily: "'Gaegu', cursive", fontSize: 30, color: "#3d3027", margin: "0 0 8px" }}>{ls.t}</h2>
          <div style={{ background: "rgba(255,255,255,0.7)", borderRadius: 20, padding: "18px 22px", marginBottom: 16, border: "2px solid #f0ebe3" }}>
            <p style={{ fontSize: 19, color: "#5a5049", lineHeight: 1.8, margin: 0, whiteSpace: "pre-line" }}>{ls.d}</p>
          </div>
          <Clock hour={ls.ex[0]} minute={ls.ex[1]} size={clockSize} showMin={ls.sm} hl={ls.hl} fiveL={step >= 4} lang={lang} />
          <div style={{ background: AC + "18", border: "2px dashed " + AC, borderRadius: 16, padding: "12px 16px", margin: "16px 0" }}>
            <p style={{ fontSize: 18, color: HC, margin: 0, fontWeight: 700 }}>💡 {ls.tip}</p>
          </div>
          <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
            {step > 0 && <Btn bg="#e0d6c8" c="#3d3027" onClick={() => setStep(s => s - 1)}>{tx("prev", lang)}</Btn>}
            {step < lessons.length - 1 ? <Btn bg={AC} c="#fff" onClick={() => setStep(s => s + 1)}>{tx("next", lang)}</Btn>
              : <Btn bg={SC} c="#fff" onClick={onHome}>🎉 {tx("done", lang)}</Btn>}
          </div>
        </div>
      );
    }

    function PlayMode({ lang, onHome }) {
      const [hour, setHour] = useState(12);
      const [minute, setMinute] = useState(0);
      const clockSize = useClockSize(0.95);
      return (
        <div style={{ textAlign: "center", padding: "0 16px" }}>
          <p style={{ fontSize: 20, color: "#5a5049", marginBottom: 16 }}>🖐️ {tx("drag", lang)}</p>
          <Clock hour={hour} minute={minute} size={clockSize} drag showMin onChange={(h, m) => { setHour(h); setMinute(m); }} fiveL lang={lang} />
          <div style={{ marginTop: 16, background: "rgba(255,255,255,0.8)", borderRadius: 20, padding: "16px 24px", border: "2px solid #f0ebe3" }}>
            <p style={{ fontSize: 28, fontFamily: "'Gaegu', cursive", fontWeight: 700, color: "#3d3027", margin: 0 }}>
              {fmtTime(hour, minute, lang)}
            </p>
          </div>
          <Btn bg="#e0d6c8" c="#3d3027" onClick={onHome} style={{ marginTop: 20 }}>🏠 {tx("home", lang)}</Btn>
        </div>
      );
    }

    const QL = [
      () => ({ h: rand(1, 12), m: 0 }),
      () => ({ h: rand(1, 12), m: Math.random() > 0.5 ? 0 : 30 }),
      () => ({ h: rand(1, 12), m: [0, 15, 30, 45][rand(0, 3)] }),
      () => ({ h: rand(1, 12), m: rand(0, 11) * 5 }),
    ];

    function QuizMode({ lang, onHome }) {
      const clockSize = useClockSize(0.95);
      const [lv, setLv] = useState(0);
      const [mode, setMode] = useState(null);
      const [q, setQ] = useState(null);
      const [opts, setOpts] = useState([]);
      const [sel, setSel] = useState(null);
      const [fb, setFb] = useState(null);
      const [sc, setSc] = useState(0);
      const [rd, setRd] = useState(0);
      const [sH, setSH] = useState(12);
      const [sM, setSM] = useState(0);
      const [done, setDone] = useState(false);
      const total = 5;
      const lvLabels = (I.lvl[lang] || I.lvl.en);

      const newRead = useCallback(() => {
        const nq = QL[lv]();
        const cor = fmtTime(nq.h, nq.m, lang);
        const os = new Set([cor]);
        let tries = 0;
        while (os.size < 4 && tries < 50) { const f = QL[lv](); os.add(fmtTime(f.h, f.m, lang)); tries++; }
        setQ(nq); setOpts(shuf([...os])); setSel(null); setFb(null);
      }, [lv, lang]);

      const newSet = useCallback(() => {
        setQ(QL[lv]()); setSH(12); setSM(0); setDone(false); setFb(null);
      }, [lv]);

      useEffect(() => {
        if (mode === "read") newRead();
        else if (mode === "set") newSet();
      }, [mode]);

      const doRead = (opt) => {
        if (fb !== null) return;
        setSel(opt);
        const ok = opt === fmtTime(q.h, q.m, lang);
        setFb(ok);
        if (ok) setSc(s => s + 1);
        setTimeout(() => { if (rd + 1 >= total) { setRd(r => r + 1); return; } setRd(r => r + 1); newRead(); }, 1300);
      };

      const doSet = () => {
        if (done) return;
        setDone(true);
        const ok = sH === q.h && sM === q.m;
        setFb(ok);
        if (ok) setSc(s => s + 1);
        setTimeout(() => { if (rd + 1 >= total) { setRd(r => r + 1); return; } setRd(r => r + 1); newSet(); }, 1300);
      };

      if (mode === null) return (
        <div style={{ textAlign: "center", padding: "0 16px" }}>
          <h2 style={{ fontFamily: "'Gaegu', cursive", fontSize: 26, color: "#3d3027", margin: "0 0 16px" }}>{tx("diff", lang)}</h2>
          <div style={{ display: "flex", gap: 8, justifyContent: "center", marginBottom: 24, flexWrap: "wrap" }}>
            {lvLabels.map((lb, i) => <button key={i} onClick={() => setLv(i)} style={{ padding: "10px 22px", fontSize: 17, borderRadius: 30, fontWeight: 700, border: lv === i ? "3px solid " + AC : "3px solid #e0d6c8", background: lv === i ? AC + "20" : "#fff", color: lv === i ? AC : "#5a5049", cursor: "pointer" }}>{lb}</button>)}
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12, maxWidth: 280, margin: "0 auto" }}>
            <BigBtn bg={HC} onClick={() => { setMode("read"); setSc(0); setRd(0); }}>🔍 {tx("readQ", lang)}</BigBtn>
            <BigBtn bg={MC} onClick={() => { setMode("set"); setSc(0); setRd(0); }}>🖐️ {tx("setQ", lang)}</BigBtn>
          </div>
          <Btn bg="#e0d6c8" c="#3d3027" onClick={onHome} style={{ marginTop: 24 }}>🏠 {tx("home", lang)}</Btn>
        </div>
      );

      if (rd >= total) {
        const stars = sc >= 5 ? 3 : sc >= 3 ? 2 : 1;
        return (
          <div style={{ textAlign: "center", padding: "20px 16px" }}>
            <div style={{ fontSize: 56, marginBottom: 12 }}>{"⭐".repeat(stars)}</div>
            <h2 style={{ fontFamily: "'Gaegu', cursive", fontSize: 30, color: "#3d3027", margin: "0 0 8px" }}>
              {sc >= 5 ? "🎉" : sc >= 3 ? "👏" : "💪"}
            </h2>
            <p style={{ fontSize: 20, color: "#5a5049" }}>{sc} / {total} {tx("correct", lang)}</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", marginTop: 24 }}>
              <Btn bg={AC} c="#fff" onClick={() => { setMode(null); setSc(0); setRd(0); }}>{tx("again", lang)}</Btn>
              <Btn bg="#e0d6c8" c="#3d3027" onClick={onHome}>🏠 {tx("home", lang)}</Btn>
            </div>
          </div>
        );
      }

      if (!q) return null;

      if (mode === "read") return (
        <div style={{ textAlign: "center", padding: "0 12px" }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 8 }}>
            <Badge l={tx("score", lang)} v={sc} c="#FECA57" />
            <Badge l={tx("qNum", lang)} v={(rd + 1) + "/" + total} c="#48DBFB" />
          </div>
          <p style={{ fontSize: 20, fontFamily: "'Gaegu', cursive", fontWeight: 700, color: "#3d3027", margin: "0 0 6px" }}>{tx("whatTime", lang)} 🤔</p>
          <Clock hour={q.h} minute={q.m} size={clockSize} showMin digital={false} fiveL lang={lang} />
          {fb !== null && <div style={{ fontSize: 22, margin: "6px 0" }}>{fb ? ("🎉 " + tx("correct", lang)) : ("😅 " + fmtTime(q.h, q.m, lang))}</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, margin: "8px auto 0" }}>
            {opts.map((op, i) => {
              const cor = fmtTime(q.h, q.m, lang);
              const isC = fb !== null && op === cor;
              const isW = fb !== null && op === sel && !fb;
              return <button key={i} onClick={() => doRead(op)} style={{ padding: "12px 4px", fontSize: 15, fontWeight: 700, border: isC ? "3px solid " + SC : isW ? "3px solid #e17055" : "3px solid #f0ebe3", borderRadius: 14, cursor: fb !== null ? "default" : "pointer", background: isC ? SC + "20" : isW ? "#ffeaeb" : "#fff", color: "#3d3027", boxShadow: "0 2px 8px rgba(0,0,0,0.05)" }}>{op}</button>;
            })}
          </div>
        </div>
      );

      return (
        <div style={{ textAlign: "center", padding: "0 12px" }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 8 }}>
            <Badge l={tx("score", lang)} v={sc} c="#FECA57" />
            <Badge l={tx("qNum", lang)} v={(rd + 1) + "/" + total} c="#48DBFB" />
          </div>
          <div style={{ background: "#1e272e", borderRadius: 14, padding: "10px 24px", display: "inline-block", marginBottom: 8, border: "3px solid #3d3027" }}>
            <span style={{ fontFamily: "'Bagel Fat One', cursive", fontSize: 28, color: "#7bed9f", letterSpacing: 3 }}>{fmtTime(q.h, q.m, lang)}</span>
          </div>
          <p style={{ fontSize: 16, color: "#5a5049", margin: "0 0 6px" }}>{tx("setTime", lang)}</p>
          <Clock hour={sH} minute={sM} size={clockSize} drag={!done} showMin onChange={(h, m) => { setSH(h); setSM(m); }} digital fiveL lang={lang} />
          {fb !== null && <div style={{ fontSize: 22, margin: "6px 0" }}>{fb ? ("🎉 " + tx("correct", lang)) : ("😅 " + fmtTime(q.h, q.m, lang))}</div>}
          {!done && <Btn bg={SC} c="#fff" onClick={doSet} style={{ marginTop: 8 }}>✅ {tx("submit", lang)}</Btn>}
        </div>
      );
    }

    function Badge({ l, v, c }) {
      return <div style={{ background: "#fff", borderRadius: 14, padding: "5px 16px", border: "2px solid " + c, boxShadow: "0 3px 12px " + c + "30" }}>
        <div style={{ fontSize: 11, color: "#888" }}>{l}</div>
        <div style={{ fontSize: 20, fontFamily: "'Gaegu', cursive", fontWeight: 700, color: "#3d3027" }}>{v}</div>
      </div>;
    }

    function Btn({ bg, c, onClick, children, style: s }) {
      return <button onClick={onClick} style={{ padding: "14px 32px", fontSize: 18, fontWeight: 700, background: bg, color: c, border: "none", borderRadius: 50, cursor: "pointer", boxShadow: "0 4px 15px rgba(0,0,0,0.1)", ...s }}>{children}</button>;
    }

    function BigBtn({ bg, onClick, children }) {
      return <button onClick={onClick} style={{ padding: "20px 28px", fontSize: 20, fontWeight: 700, background: bg, color: "#fff", border: "none", borderRadius: 20, cursor: "pointer", boxShadow: "0 6px 20px " + bg + "40", textAlign: "center" }}>{children}</button>;
    }

    function LiveClock({ lang }) {
      const [t, setT] = useState(new Date());
      useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
      return (
        <div style={{ textAlign: "center" }}>
          <p style={{ fontSize: 13, color: "#8a7e72", margin: "0 0 8px" }}>{tx("now", lang)}</p>
          <Clock hour={t.getHours() % 12 || 12} minute={t.getMinutes()} size={180} digital showMin lang={lang} />
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState("ko");
      const [scr, setScr] = useState("home");
      const menus = [
        { id: "learn", emoji: "📖", tk: "learn", dk: "learnD", color: HC },
        { id: "play", emoji: "🖐️", tk: "play", dk: "playD", color: MC },
        { id: "quiz", emoji: "🧩", tk: "quiz", dk: "quizD", color: AC },
      ];
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(170deg, #fef9ef 0%, #fdecd0 40%, #f8e8d6 100%)", position: "relative", userSelect: "none", WebkitUserSelect: "none", WebkitTouchCallout: "none" }}>
          <LangPicker lang={lang} setLang={setLang} />
          <div style={{ maxWidth: 620, margin: "0 auto", padding: "16px 20px", position: "relative", zIndex: 1 }}>
            {scr !== "home" ? (
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                <button onClick={() => setScr("home")} style={{ background: "rgba(255,255,255,0.8)", border: "2px solid #e0d6c8", borderRadius: 50, width: 40, height: 40, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: "0 3px 10px rgba(0,0,0,0.06)", flexShrink: 0 }}>←</button>
                <h1 style={{ fontFamily: "'Gaegu', cursive", fontSize: 24, color: "#3d3027", margin: 0 }}>🕰️ {tx(scr, lang)}</h1>
              </div>
            ) : (
              <div style={{ textAlign: "center", marginBottom: 18 }}>
                <div style={{ fontSize: 40, display: "inline-block" }}>🕰️</div>
                <h1 style={{ fontFamily: "'Gaegu', cursive", fontSize: 38, color: "#3d3027", margin: "4px 0 0" }}>{tx("appTitle", lang)}</h1>
                <p style={{ color: "#8a7e72", fontSize: 18, margin: "4px 0 0" }}>{tx("sub", lang)} ✨</p>
              </div>
            )}

            {scr === "home" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {menus.map((item) => (
                  <button key={item.id} onClick={() => setScr(item.id)} style={{
                    display: "flex", alignItems: "center", gap: 16, padding: "20px 22px",
                    background: "rgba(255,255,255,0.9)", border: "2px solid #f0ebe3",
                    borderRadius: 22, cursor: "pointer", boxShadow: "0 6px 24px rgba(0,0,0,0.05)", textAlign: "left",
                  }}>
                    <div style={{ fontSize: 36, width: 60, height: 60, display: "flex", alignItems: "center", justifyContent: "center", background: item.color + "12", borderRadius: 16, flexShrink: 0 }}>{item.emoji}</div>
                    <div>
                      <div style={{ fontFamily: "'Gaegu', cursive", fontSize: 26, fontWeight: 700, color: "#3d3027" }}>{tx(item.tk, lang)}</div>
                      <div style={{ fontSize: 16, color: "#8a7e72", marginTop: 2 }}>{tx(item.dk, lang)}</div>
                    </div>
                    <div style={{ marginLeft: "auto", fontSize: 20, color: "#ccc" }}>▶</div>
                  </button>
                ))}
                <div style={{ marginTop: 8 }}><LiveClock lang={lang} /></div>
              </div>
            )}
            {scr === "learn" && <LearnMode lang={lang} onHome={() => setScr("home")} />}
            {scr === "play" && <PlayMode lang={lang} onHome={() => setScr("home")} />}
            {scr === "quiz" && <QuizMode lang={lang} onHome={() => setScr("home")} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
