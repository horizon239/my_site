            <Badge l={tx("qNum", lang)} v={(rd + 1) + "/" + total} c="#48DBFB" />
          </div>
          <p style={{ fontSize: 20, fontFamily: "'Gaegu',cursive", fontWeight: 700, color: "#3d3027", margin: "0 0 4px" }}>{tx("whatTime", lang)} 🤔</p>
          <Clock hour={q.h} minute={q.m} size={clockSize} showMin={true} fiveL={true} lang={lang} />
          {fb !== null && <div style={{ fontSize: 22, margin: "6px 0" }}>{fb ? ("🎉 " + tx("correct", lang)) : ("😅 " + fmtTime(q.h, q.m, lang))}</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, margin: "6px auto 0" }}>
            {opts.map(function (op, i) { var cor = fmtTime(q.h, q.m, lang); var isC = fb !== null && op === cor; var isW = fb !== null && op === sel && !fb; return <button key={i} onClick={function () { doRead(op); }} style={{ padding: "12px 4px", fontSize: 15, fontWeight: 700, border: isC ? "3px solid " + SC : isW ? "3px solid #e17055" : "3px solid #f0ebe3", borderRadius: 14, cursor: fb !== null ? "default" : "pointer", background: isC ? SC + "20" : isW ? "#ffeaeb" : "#fff", color: "#3d3027" }}>{op}</button>; })}
          </div>
        </div>
      );

      return (
        <div style={{ textAlign: "center", padding: "0 8px" }}>
          <div style={{ display: "flex", justifyContent: "center", gap: 12, marginBottom: 6 }}>
            <Badge l={tx("score", lang)} v={sc} c="#FECA57" />
            <Badge l={tx("qNum", lang)} v={(rd + 1) + "/" + total} c="#48DBFB" />
          </div>
          <div style={{ background: "#1e272e", borderRadius: 14, padding: "10px 24px", display: "inline-block", marginBottom: 6, border: "3px solid #3d3027" }}>
            <span style={{ fontFamily: "'Bagel Fat One',cursive", fontSize: 28, color: "#7bed9f", letterSpacing: 3 }}>{fmtTime(q.h, q.m, lang)}</span>
          </div>
          <p style={{ fontSize: 15, color: "#5a5049", margin: "0 0 4px" }}>{tx("setTime", lang)}</p>
          <Clock hour={sH} minute={sM} size={clockSize} drag={!dn} showMin={true} onChange={function (h, m) { setSH(h); setSM(m); }} fiveL={true} lang={lang} />
          {fb !== null && <div style={{ fontSize: 22, margin: "6px 0" }}>{fb ? ("🎉 " + tx("correct", lang)) : ("😅 " + fmtTime(q.h, q.m, lang))}</div>}
          {!dn && <Btn bg={SC} c="#fff" onClick={doSet} style={{ marginTop: 6 }}>✅ {tx("submit", lang)}</Btn>}
        </div>
      );
    }

    function LiveClock(props) {
      var lang = props.lang;
      var _t = useState(new Date()), time = _t[0], setTime = _t[1];
      useEffect(function () { var id = setInterval(function () { setTime(new Date()); }, 1000); return function () { clearInterval(id); }; }, []);
      return (
        <div style={{ textAlign: "center" }}>
          <p style={{ fontSize: 13, color: "#8a7e72", margin: "0 0 8px" }}>{tx("now", lang)}</p>
          <Clock hour={time.getHours() % 12 || 12} minute={time.getMinutes()} size={180} digital={true} showMin={true} lang={lang} />
        </div>
      );
    }

    function App() {
      var _l = useState("ko"), lang = _l[0], setLang = _l[1];
      var _s = useState("home"), scr = _s[0], setScr = _s[1];
      var menus = [
        { id: "learn", emoji: "📖", tk: "learn", dk: "learnD", color: HC },
        { id: "play", emoji: "🖐️", tk: "play", dk: "playD", color: MC },
        { id: "quiz", emoji: "🧩", tk: "quiz", dk: "quizD", color: AC },
      ];
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(170deg,#fef9ef 0%,#fdecd0 40%,#f8e8d6 100%)", position: "relative", userSelect: "none", WebkitUserSelect: "none", WebkitTouchCallout: "none" }}>
          <LangPicker lang={lang} setLang={setLang} />
          <div style={{ maxWidth: 640, margin: "0 auto", padding: "14px 16px", position: "relative", zIndex: 1 }}>
            {scr !== "home" ? (
              <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
                <button onClick={function () { setScr("home"); }} style={{ background: "rgba(255,255,255,0.8)", border: "2px solid #e0d6c8", borderRadius: 50, width: 40, height: 40, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>←</button>
                <h1 style={{ fontFamily: "'Gaegu',cursive", fontSize: 24, color: "#3d3027", margin: 0 }}>{tx(scr, lang)}</h1>
              </div>
            ) : (
              <div style={{ textAlign: "center", marginBottom: 20 }}>
                <div style={{ fontSize: 40, display: "inline-block" }}>🕰️</div>
                <h1 style={{ fontFamily: "'Gaegu',cursive", fontSize: 38, color: "#3d3027", margin: "4px 0 0" }}>{tx("appTitle", lang)}</h1>
                <p style={{ color: "#8a7e72", fontSize: 18, margin: "4px 0 0" }}>{tx("sub", lang)} ✨</p>
              </div>
            )}
            {scr === "home" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                {menus.map(function (item) { return (
                  <button key={item.id} onClick={function () { setScr(item.id); }} style={{ display: "flex", alignItems: "center", gap: 16, padding: "20px 22px", background: "rgba(255,255,255,0.9)", border: "2px solid #f0ebe3", borderRadius: 22, cursor: "pointer", boxShadow: "0 6px 24px rgba(0,0,0,0.05)", textAlign: "left" }}>
                    <div style={{ fontSize: 36, width: 60, height: 60, display: "flex", alignItems: "center", justifyContent: "center", background: item.color + "12", borderRadius: 16, flexShrink: 0 }}>{item.emoji}</div>
                    <div>
                      <div style={{ fontFamily: "'Gaegu',cursive", fontSize: 26, fontWeight: 700, color: "#3d3027" }}>{tx(item.tk, lang)}</div>
                      <div style={{ fontSize: 16, color: "#8a7e72", marginTop: 2 }}>{tx(item.dk, lang)}</div>
                    </div>
                    <div style={{ marginLeft: "auto", fontSize: 20, color: "#ccc" }}>▶</div>
                  </button>
                ); })}
                <div style={{ marginTop: 8 }}><LiveClock lang={lang} /></div>
              </div>
            )}
            {scr === "learn" && <LearnMode lang={lang} onHome={function () { setScr("home"); }} />}
            {scr === "play" && <PlayMode lang={lang} onHome={function () { setScr("home"); }} />}
            {scr === "quiz" && <QuizMode lang={lang} onHome={function () { setScr("home"); }} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
