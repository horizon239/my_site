<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #555;
      --accent: #c8a96e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(200,169,110,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.4s forwards;
      z-index: 2;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }

    .lang-picker {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      cursor: pointer;
      color: #888;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    .lang-btn:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }
    .lang-flag { font-size: 16px; }
    .lang-arrow { font-size: 9px; opacity: 0.5; }
    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      min-width: 160px;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #666;
      font-size: 13px;
      text-align: left;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .lang-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .lang-option.active { color: var(--accent); }
    .lang-check { margin-left: auto; font-size: 10px; color: var(--accent); }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 80px;
    }

    .deco-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeDown 1s ease 0.2s forwards;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 90px);
      letter-spacing: 0.18em;
      color: var(--text);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .logo-bar {
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 16px 0 12px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    .subtitle {
      font-size: clamp(11px, 1.6vw, 13px);
      color: #666;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.0s forwards;
      margin-bottom: 60px;
    }

    .section-label-row {
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
      margin-bottom: 24px;
      width: 100%;
      max-width: 860px;
      justify-content: center;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .edit-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      color: #666;
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .edit-btn:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }
    .edit-btn.active { border-color: var(--accent); color: var(--accent); }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.3s forwards;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 28px 28px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,169,110,0.04), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(200,169,110,0.3);
      background: #141416;
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card.editing {
      pointer-events: none;
      cursor: default;
      transform: none;
    }
    .card.editing:hover { border-color: rgba(200,169,110,0.2); background: var(--surface); transform: none; }
    .card.editing:hover::before { opacity: 0; }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
    }

    .card-icon {
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      line-height: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      filter: grayscale(0.2);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
      font-weight: 300;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s, gap 0.2s;
    }

    .card:not(.editing):hover .card-arrow { color: var(--accent); gap: 12px; }
    .card-arrow::after { content: '→'; }

    .card-move-btns {
      display: none;
      position: absolute;
      top: 10px;
      right: 10px;
      flex-direction: column;
      gap: 4px;
      z-index: 2;
      pointer-events: auto;
    }

    .card-move-btn {
      width: 28px;
      height: 28px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      pointer-events: auto;
    }
    .card-move-btn:hover { background: rgba(200,169,110,0.2); border-color: rgba(200,169,110,0.5); }
    .card-move-btn:disabled { opacity: 0.2; cursor: default; }

    .deco-bottom {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
      z-index: 2;
    }
    .deco-bottom span {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #333;
      text-transform: uppercase;
    }
    .deco-bottom::before,
    .deco-bottom::after {
      content: '';
      width: 32px;
      height: 1px;
      background: #222;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>

</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="lang-picker" id="langPicker">
    <button class="lang-btn" onclick="toggleLangDropdown()">
      <span class="lang-flag" id="langFlag">🇰🇷</span>
      <span id="langName">한국어</span>
      <span class="lang-arrow" id="langArrow">▼</span>
    </button>
    <div class="lang-dropdown" id="langDropdown"></div>
  </div>

  <div class="wrap">
    <div class="deco-line"></div>
    <div class="logo">Just Play</div>
    <div class="logo-bar"></div>
    <p class="subtitle" id="txtSubtitle">Select &amp; Enjoy</p>

    <div class="section-label-row">
      <div class="section-label" id="txtSection">Contents</div>
      <button class="edit-btn" id="freqBtn" onclick="sortByFrequency()">자주 사용순</button>
      <button class="edit-btn" id="editBtn" onclick="toggleEdit()">편집</button>
    </div>

    <div class="cards" id="cardsContainer"></div>
  </div>

  <div class="deco-bottom">
    <span>2026</span>
  </div>
