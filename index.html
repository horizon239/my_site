<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #555;
      --accent: #c8a96e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(200,169,110,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.4s forwards;
      z-index: 2;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }

    /* 언어 피커 */
    .lang-picker {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
    }
    .lang-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      cursor: pointer;
      color: #888;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    .lang-btn:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }
    .lang-flag { font-size: 16px; }
    .lang-arrow { font-size: 9px; opacity: 0.5; }
    .lang-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: #111113;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      min-width: 160px;
      max-height: 320px;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .lang-dropdown.open { display: block; }
    .lang-option {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 14px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #666;
      font-size: 13px;
      text-align: left;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.15s, color 0.15s;
    }
    .lang-option:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .lang-option.active { color: var(--accent); }
    .lang-check { margin-left: auto; font-size: 10px; color: var(--accent); }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 80px;
    }

    .deco-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeDown 1s ease 0.2s forwards;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 90px);
      letter-spacing: 0.18em;
      color: var(--text);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    .logo-bar {
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 16px 0 12px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    .subtitle {
      font-size: clamp(11px, 1.6vw, 13px);
      color: #666;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.0s forwards;
      margin-bottom: 60px;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.3s forwards;
    }

    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 28px 28px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,169,110,0.04), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(200,169,110,0.3);
      background: #141416;
      transform: translateY(-2px);
    }

    .card:hover::before { opacity: 1; }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
    }

    .card-icon {
      font-size: 32px;
      line-height: 1;
      filter: grayscale(0.2);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
      font-weight: 300;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s, gap 0.2s;
    }

    .card:hover .card-arrow { color: var(--accent); gap: 12px; }
    .card-arrow::after { content: '→'; }

    .deco-bottom {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
      z-index: 2;
    }
    .deco-bottom span {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #333;
      text-transform: uppercase;
    }
    .deco-bottom::before,
    .deco-bottom::after {
      content: '';
      width: 32px;
      height: 1px;
      background: #222;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- 언어 피커 -->
  <div class="lang-picker" id="langPicker">
    <button class="lang-btn" onclick="toggleLangDropdown()">
      <span class="lang-flag" id="langFlag">🇰🇷</span>
      <span id="langName">한국어</span>
      <span class="lang-arrow" id="langArrow">▼</span>
    </button>
    <div class="lang-dropdown" id="langDropdown"></div>
  </div>

  <div class="wrap">
    <div class="deco-line"></div>

    <div class="logo">Just Play</div>

    <div class="logo-bar"></div>

    <p class="subtitle" id="txtSubtitle">Select &amp; Enjoy</p>

    <div class="section-label" id="txtSection">Contents</div>

    <div class="cards">

      <!-- 시계 어드벤처 -->
      <a class="card" href="clock_adv_v1.html">
        <span class="card-tag" id="clockTag">Learning · Game</span>
        <div class="card-icon">🕰️</div>
        <div class="card-title">Clock Adventure</div>
        <p class="card-desc" id="clockDesc">시침과 분침을 배우고, 직접 돌려보고, 퀴즈까지.<br>아이와 함께 즐기는 시계 학습 앱.</p>
        <div class="card-arrow" id="clockEnter">Enter</div>
      </a>

      <!-- 추후 추가 예시 (비활성) -->
      <div class="card" style="opacity:0.3; cursor:default; pointer-events:none;">
        <span class="card-tag" id="soonTag">Coming Soon</span>
        <div class="card-icon">🎮</div>
        <div class="card-title" id="soonTitle">Next Game</div>
        <p class="card-desc" id="soonDesc">새로운 콘텐츠가 곧 추가될 예정입니다.</p>
        <div class="card-arrow">—</div>
      </div>

    </div>
  </div>

  <div class="deco-bottom">
    <span>2026</span>
  </div>

  <script>
    var LANGS = [
      { code: "ko", name: "한국어",  flag: "🇰🇷" },
      { code: "en", name: "English", flag: "🇺🇸" },
      { code: "ja", name: "日本語",  flag: "🇯🇵" },
      { code: "zh", name: "中文",    flag: "🇨🇳" },
      { code: "es", name: "Español", flag: "🇪🇸" },
      { code: "fr", name: "Français",flag: "🇫🇷" },
      { code: "de", name: "Deutsch", flag: "🇩🇪" },
      { code: "pt", name: "Português",flag:"🇧🇷" },
      { code: "hi", name: "हिन्दी",  flag: "🇮🇳" },
      { code: "ar", name: "العربية", flag: "🇸🇦" },
    ];

    var I18N = {
      subtitle: {
        ko: "Select &amp; Enjoy", en: "Select &amp; Enjoy", ja: "選んで楽しもう",
        zh: "选择并享受", es: "Elige y disfruta", fr: "Choisissez et profitez",
        de: "Wählen &amp; Genießen", pt: "Escolha e aproveite",
        hi: "चुनें और आनंद लें", ar: "اختر واستمتع",
      },
      section: {
        ko: "Contents", en: "Contents", ja: "コンテンツ", zh: "内容",
        es: "Contenidos", fr: "Contenus", de: "Inhalte", pt: "Conteúdos",
        hi: "सामग्री", ar: "المحتويات",
      },
      clockTag: {
        ko: "Learning · Game", en: "Learning · Game", ja: "学習 · ゲーム",
        zh: "学习 · 游戏", es: "Aprendizaje · Juego", fr: "Apprentissage · Jeu",
        de: "Lernen · Spiel", pt: "Aprendizagem · Jogo",
        hi: "सीखना · खेल", ar: "تعلم · لعبة",
      },
      clockDesc: {
        ko: "시침과 분침을 배우고, 직접 돌려보고, 퀴즈까지.<br>아이와 함께 즐기는 시계 학습 앱.",
        en: "Learn hour &amp; minute hands, spin them yourself, take a quiz.<br>A clock learning app to enjoy with your child.",
        ja: "時針と分針を学んで、自分で動かして、クイズも！<br>子供と一緒に楽しめる時計学習アプリ。",
        zh: "学习时针分针，自己拨动，还有小测验。<br>和孩子一起的时钟学习应用。",
        es: "Aprende las agujas, gíralas y haz un quiz.<br>Una app para aprender el reloj con tu hijo.",
        fr: "Apprends les aiguilles, fais-les tourner et joue au quiz.<br>Une appli d'apprentissage de l'horloge.",
        de: "Lerne die Zeiger, dreh sie selbst und mach ein Quiz.<br>Eine Uhr-Lern-App für Kinder.",
        pt: "Aprenda os ponteiros, gire-os e faça um quiz.<br>Um app de aprendizagem do relógio.",
        hi: "घंटे-मिनट की सुइयाँ सीखें, घुमाएं और क्विज़ लें।<br>बच्चों के साथ घड़ी सीखने का ऐप।",
        ar: "تعلم عقارب الساعة، أدرها وخض الاختبار.<br>تطبيق تعلم الساعة مع طفلك.",
      },
      clockEnter: {
        ko: "시작하기", en: "Enter", ja: "はじめる", zh: "进入",
        es: "Entrar", fr: "Entrer", de: "Starten", pt: "Entrar",
        hi: "शुरू करें", ar: "ادخل",
      },
      soonTag: {
        ko: "Coming Soon", en: "Coming Soon", ja: "近日公開", zh: "即将推出",
        es: "Próximamente", fr: "Bientôt", de: "Demnächst", pt: "Em breve",
        hi: "जल्द आएगा", ar: "قريباً",
      },
      soonTitle: {
        ko: "Next Game", en: "Next Game", ja: "次のゲーム", zh: "下一个游戏",
        es: "Próximo Juego", fr: "Prochain Jeu", de: "Nächstes Spiel",
        pt: "Próximo Jogo", hi: "अगला खेल", ar: "اللعبة القادمة",
      },
      soonDesc: {
        ko: "새로운 콘텐츠가 곧 추가될 예정입니다.", en: "New content will be added soon.",
        ja: "新しいコンテンツが近日公開されます。", zh: "新内容即将添加。",
        es: "Nuevo contenido próximamente.", fr: "Nouveau contenu bientôt.",
        de: "Neue Inhalte kommen bald.", pt: "Novo conteúdo em breve.",
        hi: "नई सामग्री जल्द आएगी।", ar: "محتوى جديد قريباً.",
      },
    };

    function getSavedLang() {
      try { return localStorage.getItem('lang') || 'ko'; } catch(e) { return 'ko'; }
    }

    function saveLang(code) {
      try { localStorage.setItem('lang', code); } catch(e) {}
    }

    function tx(key, lang) {
      var map = I18N[key]; if (!map) return '';
      return map[lang] || map['en'] || '';
    }

    function applyLang(code) {
      var l = LANGS.find(function(x) { return x.code === code; });
      if (!l) return;
      document.getElementById('langFlag').textContent = l.flag;
      document.getElementById('langName').textContent = l.name;

      // 텍스트 업데이트
      ['subtitle','section','clockTag','clockEnter','soonTag','soonTitle','soonDesc'].forEach(function(key) {
        var el = document.getElementById('txt' + key.charAt(0).toUpperCase() + key.slice(1)) ||
                 document.getElementById(key);
        if (el) el.innerHTML = tx(key, code);
      });
      document.getElementById('clockDesc').innerHTML = tx('clockDesc', code);

      // 활성 표시
      document.querySelectorAll('.lang-option').forEach(function(btn) {
        var isActive = btn.dataset.code === code;
        btn.classList.toggle('active', isActive);
        var chk = btn.querySelector('.lang-check');
        if (chk) chk.style.display = isActive ? 'inline' : 'none';
      });

      saveLang(code);
    }

    function toggleLangDropdown() {
      var dd = document.getElementById('langDropdown');
      dd.classList.toggle('open');
      document.getElementById('langArrow').textContent = dd.classList.contains('open') ? '▲' : '▼';
    }

    function closeLangDropdown() {
      document.getElementById('langDropdown').classList.remove('open');
      document.getElementById('langArrow').textContent = '▼';
    }

    // 드롭다운 목록 생성
    var dropdown = document.getElementById('langDropdown');
    LANGS.forEach(function(l) {
      var btn = document.createElement('button');
      btn.className = 'lang-option';
      btn.dataset.code = l.code;
      btn.innerHTML = '<span>' + l.flag + '</span><span>' + l.name + '</span><span class="lang-check">✓</span>';
      btn.onclick = function() { applyLang(l.code); closeLangDropdown(); };
      dropdown.appendChild(btn);
    });

    // 외부 클릭 시 닫기
    document.addEventListener('click', function(e) {
      if (!document.getElementById('langPicker').contains(e.target)) closeLangDropdown();
    });

    // 초기화
    applyLang(getSavedLang());
  </script>

</body>
</html>
