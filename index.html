<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #555;
      --accent: #c8a96e;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* 배경 노이즈 텍스처 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(200,169,110,0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* 가는 격자 */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    /* 모서리 장식 */
    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.4s forwards;
      z-index: 2;
    }
    .corner.tl { top: 24px; left: 24px; border-top: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.tr { top: 24px; right: 24px; border-top: 1px solid var(--border); border-right: 1px solid var(--border); }
    .corner.bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--border); border-left: 1px solid var(--border); }
    .corner.br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 24px 80px;
    }

    /* 상단 장식 라인 */
    .deco-line {
      width: 1px;
      height: 60px;
      background: linear-gradient(to bottom, transparent, var(--accent));
      margin-bottom: 32px;
      opacity: 0;
      animation: fadeDown 1s ease 0.2s forwards;
    }

    /* 로고 */
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 10vw, 90px);
      letter-spacing: 0.18em;
      color: var(--text);
      line-height: 1;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.5s forwards;
    }

    /* 로고 아래 구분선 */
    .logo-bar {
      width: 100%;
      max-width: 340px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 16px 0 12px;
      opacity: 0;
      animation: fadeIn 0.8s ease 0.9s forwards;
    }

    /* 서브타이틀 */
    .subtitle {
      font-size: clamp(11px, 1.6vw, 13px);
      color: #666;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.0s forwards;
      margin-bottom: 60px;
    }

    /* 섹션 라벨 */
    .section-label {
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeIn 0.8s ease 1.2s forwards;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .section-label::before,
    .section-label::after {
      content: '';
      width: 32px;
      height: 1px;
      background: var(--accent);
      opacity: 0.4;
    }

    /* 카드 그리드 */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 860px;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.3s forwards;
    }

    /* 콘텐츠 카드 */
    .card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 28px 28px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.25s, background 0.25s, transform 0.2s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(200,169,110,0.04), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(200,169,110,0.3);
      background: #141416;
      transform: translateY(-2px);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
    }

    .card-icon {
      font-size: 32px;
      line-height: 1;
      filter: grayscale(0.2);
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.12em;
      color: var(--text);
      line-height: 1;
    }

    .card-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.7;
      font-weight: 300;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #444;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s, gap 0.2s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      gap: 12px;
    }

    .card-arrow::after {
      content: '→';
    }

    /* 하단 장식 */
    .deco-bottom {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      opacity: 0;
      animation: fadeIn 1s ease 1.6s forwards;
      z-index: 2;
    }
    .deco-bottom span {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #333;
      text-transform: uppercase;
    }
    .deco-bottom::before,
    .deco-bottom::after {
      content: '';
      width: 32px;
      height: 1px;
      background: #222;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="wrap">
    <div class="deco-line"></div>

    <div class="logo">Just Play</div>

    <div class="logo-bar"></div>

    <p class="subtitle">Select &amp; Enjoy</p>

    <div class="section-label">Contents</div>

    <div class="cards">

      <!-- 시계 어드벤처 -->
      <a class="card" href="clock_adv_v1.html">
        <span class="card-tag">Learning · Game</span>
        <div class="card-icon">🕰️</div>
        <div class="card-title">Clock Adventure</div>
        <p class="card-desc">시침과 분침을 배우고, 직접 돌려보고, 퀴즈까지.<br>아이와 함께 즐기는 시계 학습 앱.</p>
        <div class="card-arrow">Enter</div>
      </a>

      <!-- 추후 추가 예시 (비활성) -->
      <div class="card" style="opacity:0.3; cursor:default; pointer-events:none;">
        <span class="card-tag">Coming Soon</span>
        <div class="card-icon">🎮</div>
        <div class="card-title">Next Game</div>
        <p class="card-desc">새로운 콘텐츠가 곧 추가될 예정입니다.</p>
        <div class="card-arrow">Soon</div>
      </div>

    </div>
  </div>

  <div class="deco-bottom">
    <span>2026</span>
  </div>

</body>
</html>
