<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>의견·버그 제보 게시판</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #555;
      --accent: #c8a96e;
      --danger: #c87070;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,169,110,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      padding: 40px 18px 100px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 3px;
      color: #888;
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.05em;
      transition: border-color 0.2s, color 0.2s;
    }
    .home-link:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }

    .head {
      text-align: center;
      margin-bottom: 32px;
    }
    .head h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(30px, 7vw, 46px);
      letter-spacing: 0.12em;
      font-weight: 400;
      line-height: 1;
    }
    .head .bar {
      width: 100%;
      max-width: 220px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 14px auto 12px;
    }
    .head p {
      font-size: 12px;
      color: #777;
      letter-spacing: 0.04em;
      line-height: 1.6;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }
    .field-label {
      display: block;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .type-tabs { display: flex; gap: 8px; }
    .type-tab {
      flex: 1;
      padding: 9px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: #888;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .type-tab:hover { color: var(--text); }
    .type-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.08);
    }

    textarea, input[type="text"], input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 300;
      padding: 11px 12px;
      transition: border-color 0.2s;
    }
    textarea { resize: vertical; min-height: 96px; line-height: 1.6; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }

    .row { display: flex; gap: 10px; align-items: flex-end; }
    .row .field { flex: 1; margin-bottom: 0; }

    .btn {
      padding: 11px 20px;
      border: 1px solid var(--accent);
      border-radius: 4px;
      background: rgba(200,169,110,0.1);
      color: var(--accent);
      font-family: inherit;
      font-size: 14px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(200,169,110,0.2); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-block { width: 100%; margin-top: 16px; }
    .btn-ghost {
      border-color: var(--border);
      background: transparent;
      color: #888;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .btn-danger { border-color: var(--danger); background: rgba(200,112,112,0.1); color: var(--danger); }
    .btn-danger:hover { background: rgba(200,112,112,0.22); }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 7px;
      line-height: 1.5;
    }

    .list-head {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .list-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .post {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px 16px 12px;
      margin-bottom: 12px;
    }
    .post-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 9px;
    }
    .badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 3px 9px;
      border-radius: 3px;
      font-weight: 400;
    }
    .badge.bug { background: rgba(200,112,112,0.15); color: var(--danger); }
    .badge.suggestion { background: rgba(200,169,110,0.15); color: var(--accent); }
    .post-date { font-size: 11px; color: var(--muted); }
    .post-edited { font-size: 11px; color: var(--muted); font-style: italic; }
    .post-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .post-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }
    .mini-btn {
      padding: 4px 11px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: #777;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .mini-btn:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }
    .mini-btn.del:hover { border-color: var(--danger); color: var(--danger); }

    .inline-edit { margin-top: 12px; }
    .inline-edit .row { margin-top: 10px; }

    .empty, .loading {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 0;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1c;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text);
      font-size: 12px;
      padding: 10px 20px;
      border-radius: 4px;
      z-index: 100;
      letter-spacing: 0.04em;
      max-width: 90vw;
      text-align: center;
      animation: fadeIn 0.2s ease forwards;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* 공감 버튼 */
    .vote-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: #999;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    .vote-btn:hover { border-color: rgba(200,169,110,0.4); color: var(--text); }
    .vote-btn.voted {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(200,169,110,0.08);
    }
    .vote-btn:disabled { opacity: 0.35; cursor: default; }
    .vote-btn:disabled:hover { border-color: var(--border); color: #999; }
    .vote-count { font-weight: 500; }
    .post-actions { align-items: center; }
    .post-actions .spacer { flex: 1; }

    /* 관리자 답변 블록 */
    .admin-resp {
      margin-top: 12px;
      padding: 11px 13px;
      background: rgba(200,169,110,0.07);
      border: 1px solid rgba(200,169,110,0.25);
      border-left: 3px solid var(--accent);
      border-radius: 4px;
    }
    .admin-resp-head {
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .admin-resp-body {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 관리자 바 / 버튼 */
    .admin-bar {
      display: none;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      padding: 12px 14px;
      background: rgba(200,169,110,0.06);
      border: 1px solid rgba(200,169,110,0.25);
      border-radius: 6px;
    }
    .admin-bar.show { display: flex; }
    .admin-bar .admin-status { font-size: 12px; color: var(--accent); letter-spacing: 0.04em; }
    .admin-bar input { flex: 1; min-width: 140px; }
    .mini-btn.admin { color: var(--accent); border-color: rgba(200,169,110,0.3); }
    .mini-btn.admin:hover { border-color: var(--accent); }

    @media (max-width: 480px) {
      .row { flex-direction: column; align-items: stretch; }
      .row .btn { width: 100%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.106.2" integrity="sha384-4Cjkyy4cE1EgIS0C+Y3xzGmJ2noQFRRU91yKAW8IxtPfVtbQXPMqadSc3sYnjwou" crossorigin="anonymous"></script>

<body>
  <div class="wrap">
    <div class="top-bar">
      <a class="home-link" href="index.html"><span>←</span><span id="txtHome">홈으로</span></a>
    </div>

    <!-- 관리자 바 (?admin=1 일 때만 표시) -->
    <div class="admin-bar" id="adminBar">
      <span class="admin-status" id="adminStatus">🔒 관리자</span>
      <input type="password" id="adminPwInput" maxlength="60" placeholder="관리자 비밀번호">
      <button type="button" class="mini-btn admin" id="adminLoginBtn">로그인</button>
      <button type="button" class="mini-btn" id="adminLogoutBtn" style="display:none">로그아웃</button>
    </div>

    <div class="head">
      <h1 id="txtTitle">FEEDBACK</h1>
      <div class="bar"></div>
      <p id="txtSubtitle">버그 제보나 의견·건의를 남겨주세요. 익명으로 등록됩니다.</p>
    </div>

    <!-- 작성 폼 -->
    <div class="panel">
      <div class="field">
        <span class="field-label" id="txtTypeLabel">종류</span>
        <div class="type-tabs">
          <button type="button" class="type-tab active" data-type="bug" id="txtTabBug">🐞 버그</button>
          <button type="button" class="type-tab" data-type="suggestion" id="txtTabSug">💡 의견·건의</button>
        </div>
      </div>

      <div class="field">
        <span class="field-label" id="txtContentLabel">내용</span>
        <textarea id="contentInput" maxlength="1000" placeholder="어떤 점이 불편하셨나요? 자세히 적어주실수록 도움이 됩니다."></textarea>
      </div>

      <div class="field">
        <span class="field-label" id="txtPwLabel">비밀번호</span>
        <input type="password" id="passwordInput" maxlength="20" placeholder="삭제·수정용 (4자리 이상 권장)">
        <p class="hint" id="txtPwHint">⚠ 평소 쓰는 중요한 비밀번호는 입력하지 마세요. 이 글을 수정·삭제할 때만 쓰입니다.</p>
      </div>

      <button type="button" class="btn btn-block" id="submitBtn">등록</button>
    </div>

    <!-- 목록 -->
    <div class="list-head" id="txtListHead">최근 제보</div>
    <div id="postList">
      <div class="loading" id="txtLoading">불러오는 중...</div>
    </div>
  </div>
