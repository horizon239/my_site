<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>숫자 놀이터 — 어린이 덧셈뺄셈 구구단</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f9ec;
  --bg2:#e1f2d2;
  --card:#ffffff;
  --ink:#324027;
  --muted:#8a9a7c;
  --line:#e3efd6;
  --primary:#4caf7d;
  --primary-d:#379962;
  --blue:#4aa3e8;
  --blue-d:#3d8ed0;
  --orange:#f3a53e;
  --orange-d:#e8901f;
  --red:#ef6f6f;
  --red-d:#e05252;
  --purple:#9b7ede;
  --purple-d:#8264d0;
  --gold:#f0c33e;
  --gold-d:#dba81c;
  --shadow:0 10px 28px rgba(60,120,60,0.14);
  --shadow-sm:0 4px 14px rgba(60,120,60,0.12);
}
html,body{
  height:100%;
  background:linear-gradient(160deg,var(--bg),var(--bg2));
  color:var(--ink);
  font-family:'Noto Sans KR',sans-serif;
  -webkit-tap-highlight-color:transparent;
  overflow-x:hidden;
}
button{font:inherit;color:inherit;border:none;background:none;cursor:pointer}
.app{width:min(560px,100%);margin:0 auto;min-height:100vh;padding:14px 16px 60px;position:relative}

.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.home{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:14px;background:#fff;text-decoration:none;color:var(--muted);font-size:13px;font-weight:700;box-shadow:var(--shadow-sm)}
.home:hover{color:var(--primary-d)}
.title{font-family:'Jua',sans-serif;font-size:19px;color:var(--primary-d);letter-spacing:.02em}
.stamp-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);font-size:13px;font-weight:700;color:var(--gold-d)}

.screen{display:none;animation:fade .3s ease}
.screen.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.h2{font-family:'Jua',sans-serif;font-size:19px;color:var(--ink);margin:18px 2px 12px}

/* ── Home ── */
.hero{background:linear-gradient(135deg,#eaf7e0,#d9f0c8);border-radius:24px;padding:22px 20px;text-align:center;box-shadow:var(--shadow)}
.hero .big-mascot{font-size:52px;line-height:1;margin-bottom:6px}
.hero h1{font-family:'Jua',sans-serif;font-size:24px;color:var(--primary-d);margin-bottom:4px}
.hero p{color:#5a7a4a;font-size:13px;font-weight:500}

.level-row{display:flex;gap:10px}
.level-chip{flex:1;padding:12px 8px;border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);font-family:'Jua',sans-serif;font-size:15px;color:var(--muted);transition:transform .12s,background .15s,color .15s}
.level-chip:active{transform:scale(.96)}
.level-chip.active{background:var(--primary);color:#fff}

.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.menu-card{border-radius:20px;padding:18px 14px;text-align:center;color:#fff;box-shadow:var(--shadow);transition:transform .12s}
.menu-card:active{transform:scale(.96)}
.menu-card .ic{font-size:32px;line-height:1;margin-bottom:6px}
.menu-card .nm{font-family:'Jua',sans-serif;font-size:16px}
.menu-card .ds{font-size:11px;opacity:.92;margin-top:3px;font-weight:500}
.m-add{background:linear-gradient(135deg,var(--blue),var(--blue-d))}
.m-sub{background:linear-gradient(135deg,var(--orange),var(--orange-d))}
.m-mix{background:linear-gradient(135deg,var(--purple),var(--purple-d))}
.m-mult{background:linear-gradient(135deg,var(--primary),var(--primary-d))}
.m-all{grid-column:1/-1;background:linear-gradient(135deg,var(--gold),var(--gold-d))}

.stampboard{display:flex;gap:6px;background:#fff;border-radius:18px;padding:14px 8px;box-shadow:var(--shadow-sm)}
.stamp-day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.sd-label{font-size:11px;color:var(--muted);font-weight:700}
.sd-icon{font-size:18px;opacity:.55}
.stamp-day.got .sd-icon{opacity:1}

/* ── Quiz ── */
.back-btn{display:inline-flex;align-items:center;gap:5px;margin-bottom:12px;padding:7px 13px;border-radius:13px;background:#fff;box-shadow:var(--shadow-sm);font-size:13px;font-weight:700;color:var(--muted)}
.quiz-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:700;font-size:14px;color:var(--muted)}
.pbar{height:8px;border-radius:8px;background:var(--line);overflow:hidden;margin-bottom:20px}
.pbar>i{display:block;height:100%;width:0%;background:var(--primary);border-radius:8px;transition:width .3s}
.quiz-card{background:var(--card);border-radius:24px;padding:32px 20px;text-align:center;box-shadow:var(--shadow);margin-bottom:20px}
.quiz-q{font-family:'Jua',sans-serif;font-size:34px;color:var(--ink)}
.answer-box{margin:18px auto 0;width:120px;min-height:52px;border:3px dashed var(--line);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Jua',sans-serif;font-size:28px;color:var(--primary-d)}
.feedback{min-height:24px;margin-top:14px;font-family:'Jua',sans-serif;font-size:15px}
.feedback.ok{color:var(--primary-d)}
.feedback.bad{color:var(--red-d)}

.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.keypad button{padding:16px 0;border-radius:16px;background:#fff;box-shadow:var(--shadow-sm);font-family:'Jua',sans-serif;font-size:20px;color:var(--ink);transition:transform .1s}
.keypad button:active{transform:scale(.94)}
.keypad .kp-sub{color:var(--muted);font-size:17px}
.keypad .kp-primary{background:var(--primary);color:#fff}
.keypad.disabled{opacity:.5;pointer-events:none}

/* ── Result ── */
.result-card{background:var(--card);border-radius:24px;padding:28px 20px;text-align:center;box-shadow:var(--shadow)}
.result-face{font-size:48px;line-height:1;margin-bottom:8px}
.result-msg{font-family:'Jua',sans-serif;font-size:18px;color:var(--ink);margin-bottom:8px}
.result-score{font-family:'Jua',sans-serif;font-size:34px;color:var(--primary-d)}
.result-stamp{margin-top:8px;font-size:13px;font-weight:700;color:var(--gold-d);min-height:18px}

.wrong-list{display:flex;flex-direction:column;gap:8px}
.wrong-item{background:#fff;border-radius:14px;padding:12px 14px;box-shadow:var(--shadow-sm);font-size:14px;display:flex;flex-direction:column;gap:3px}
.wrong-item .wq{font-family:'Jua',sans-serif;font-size:16px;color:var(--ink)}
.wrong-item .wh{font-size:12px;color:var(--muted)}

.result-btns{display:flex;gap:10px;margin-top:20px}
.result-btns button{flex:1;padding:14px;border-radius:16px;font-family:'Jua',sans-serif;font-size:15px}
.btn-outline{background:#fff;color:var(--muted);box-shadow:var(--shadow-sm)}
.btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow)}

@media(max-width:400px){
  .quiz-q{font-size:28px}
  .result-score{font-size:28px}
}
</style>

</head>
<body>

<div class="app">
  <div class="topbar">
    <a class="home" href="index.html">← 홈으로</a>
    <span class="title">숫자 놀이터</span>
    <span class="stamp-chip">🎖️ <span id="stampCount">0</span></span>
  </div>

  <!-- HOME -->
  <div class="screen active" id="scrHome">
    <div class="hero">
      <div class="big-mascot">🌱</div>
      <h1>숫자 놀이터</h1>
      <p>덧셈 뺄셈 구구단, 재미있게 연습해요!</p>
    </div>

    <div class="h2">난이도</div>
    <div class="level-row" id="levelRow">
      <button class="level-chip" data-level="seed">🌱 씨앗</button>
      <button class="level-chip" data-level="sprout">🌿 새싹</button>
      <button class="level-chip" data-level="tree">🌳 나무</button>
    </div>

    <div class="h2">무엇을 연습할까요?</div>
    <div class="menu-grid" id="modeGrid">
      <button class="menu-card m-add" data-mode="add"><div class="ic">➕</div><div class="nm">두 자릿수 덧셈</div><div class="ds">받아올림도 척척!</div></button>
      <button class="menu-card m-sub" data-mode="sub"><div class="ic">➖</div><div class="nm">두 자릿수 뺄셈</div><div class="ds">받아내림도 척척!</div></button>
      <button class="menu-card m-mix" data-mode="mixed_as"><div class="ic">🔀</div><div class="nm">덧셈 뺄셈 섞어서</div><div class="ds">헷갈리지 않게!</div></button>
      <button class="menu-card m-mult" data-mode="mult"><div class="ic">✖️</div><div class="nm">구구단</div><div class="ds">2단부터 9단까지</div></button>
      <button class="menu-card m-all" data-mode="all"><div class="ic">🎯</div><div class="nm">모두 섞어서</div><div class="ds">실력을 확인해봐요!</div></button>
    </div>

    <div class="h2">이번주 도장판</div>
    <div class="stampboard" id="stampBoard"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="scrQuiz">
    <button class="back-btn" id="btnQuitQuiz">← 그만하기</button>
    <div class="quiz-top">
      <span id="quizModeName">두 자릿수 덧셈</span>
      <span id="quizProgress">1 / 10</span>
    </div>
    <div class="pbar"><i id="quizPbar"></i></div>

    <div class="quiz-card">
      <div class="quiz-q" id="quizProblem">34 + 28 = ?</div>
      <div class="answer-box" id="answerBox">?</div>
      <div class="feedback" id="quizFeedback"></div>
    </div>

    <div class="keypad" id="keypad">
      <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
      <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
      <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
      <button data-k="back" class="kp-sub">⌫</button><button data-k="0">0</button><button data-k="ok" class="kp-primary">확인</button>
    </div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="scrResult">
    <div class="result-card">
      <div class="result-face" id="resultFace">🎉</div>
      <div class="result-msg" id="resultMsg">정말 잘했어요!</div>
      <div class="result-score" id="resultScore">8 / 10</div>
      <div class="result-stamp" id="resultStampMsg"></div>
    </div>

    <div class="h2" id="wrongTitle">틀린 문제 다시 보기</div>
    <div class="wrong-list" id="wrongList"></div>

    <div class="result-btns">
      <button class="btn-outline" id="btnGoHome">홈으로</button>
      <button class="btn-primary" id="btnRetry">다시 하기</button>
    </div>
  </div>
</div>
